        <div class="panel-card">
          <h3>New Machines</h3>
          <p>Unlock machines with gems as your cafe becomes more famous.</p>
          ${renderMachineShop("bakery")}
          ${renderMachineShop("tea")}
          ${renderMachineShop("juice")}
          ${renderMachineShop("ice")}
        </div>`;
    }

    function renderMachineShop(type) {
      const def = machineDefs[type];

      if (unlockedMachines[type]) {
        return `<button class="green-btn" disabled>${def.emoji} ${def.name} Owned ✓</button>`;
      }

      const rankOk = fameRank >= def.unlockRank;
      const gemOk = gems >= def.cost;
      return `<button class="orange-btn" onclick="unlockMachine('${type}'); refreshOpenSheet();" ${rankOk && gemOk ? "" : "disabled"}>${def.emoji} Unlock ${def.name} - ${def.cost} 💎<br>Requires: ${fameRanks[def.unlockRank].name}</button>`;
    }

    function unlockMachine(type) {
      const def = machineDefs[type];

      if (unlockedMachines[type]) return;
      if (fameRank < def.unlockRank) {
        setMsg("Reach " + fameRanks[def.unlockRank].name + " first.");
        playSound("error");
        return;
      }

      if (gems < def.cost) {
        setMsg("Need " + def.cost + " gems.");
        playSound("error");
        return;
      }

      const empty = firstEmptyCell();
      if (empty === -1) {
        setMsg("Need an empty board cell for new machine.");
        playSound("error");
        return;
      }

      gems -= def.cost;
      unlockedMachines[type] = true;
      discoveredLevel[def.chain] = Math.max(discoveredLevel[def.chain], 2);
      board[empty] = { machine: type };

      famePoints += 20;
      updateAchievements();

      showGameModal("🛒", "New Machine Unlocked!", machineImageHTML(type, "info-machine-img") + "<br>" + def.name, "A new item chain is now available. Reward: +20 ⭐");
      setMsg(def.name + " unlocked!");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
    }

    function buyEnergyWithGems(amount, cost) {
      if (gems < cost) {
        setMsg("Need " + cost + " 💎.");
        playSound("error");
        return;
      }

      if (energy >= maxEnergy) {
        setMsg("Energy is already full.");
        return;
      }

      gems -= cost;
      energy = Math.min(maxEnergy, energy + amount);
      setMsg("Energy purchased! +" + amount + " ⚡");
      playSound("upgrade");
      updateAll();
    }

    function prototypeBuyGems() {
      gems += 25;
      setMsg("Prototype gem pack added! +25 💎");
      playSound("upgrade");
      updateAll();
    }

    function todayKey() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }

    function loadMergeDropUsage() {
      const key = todayKey();
      const savedKey = localStorage.getItem("mmc_mergeDropDate") || "";
      if (savedKey !== key) {
        mergeDrop.dateKey = key;
        mergeDrop.playsToday = 0;
        localStorage.setItem("mmc_mergeDropDate", key);
        localStorage.setItem("mmc_mergeDropPlays", "0");
      } else {
        mergeDrop.dateKey = key;
        mergeDrop.playsToday = Number(localStorage.getItem("mmc_mergeDropPlays")) || 0;
      }
    }

    function saveMergeDropUsage() {
      localStorage.setItem("mmc_mergeDropDate", todayKey());
      localStorage.setItem("mmc_mergeDropPlays", String(mergeDrop.playsToday));
    }

    function renderMiniGamePanel() {
      loadMergeDropUsage();
      return `
        <div class="panel-card">
          <h3>🎮 Merge Drop</h3>
          <p>Use cafe products like a mini Tetris game. Match 3+ same items in a row to clear them and gain points.</p>
          <div class="drop-head">
            <div class="drop-stat">⭐ ${mergeDrop.score}</div>
            <div class="drop-stat">⏱️ ${mergeDrop.timeLeft}s</div>
            <div class="drop-stat">🎯 ${MERGE_DROP_TARGET}</div>
          </div>
          ${renderMergeDropStatus()}
          ${renderMergeDropBoard()}
          ${renderMergeDropControls()}
        </div>`;
    }

    function renderMergeDropStatus() {
      const left = MERGE_DROP_MAX_DAILY - mergeDrop.playsToday;
      if (mergeDrop.active) return `<p><b>Goal:</b> Reach 2000 points. Same-item rows give big points.</p>`;
      if (mergeDrop.success) return `<p>✅ Success! Reward earned: +6 💎 +20 ⚡</p><button class="green-btn" onclick="startMergeDropGame(); refreshOpenSheet();" ${left > 0 ? "" : "disabled"}>Play Again (${left}/${MERGE_DROP_MAX_DAILY})</button>`;
      if (mergeDrop.over) return `<p>Game over. Try again tomorrow or use your remaining daily play.</p><button class="orange-btn" onclick="startMergeDropGame(); refreshOpenSheet();" ${left > 0 ? "" : "disabled"}>Try Again (${left}/${MERGE_DROP_MAX_DAILY})</button>`;
      return `<p><b>Daily plays:</b> ${left}/${MERGE_DROP_MAX_DAILY}</p><button class="purple-btn" onclick="startMergeDropGame(); refreshOpenSheet();" ${left > 0 ? "" : "disabled"}>Start Merge Drop</button>`;
    }

    function renderMergeDropBoard() {
      if (!mergeDrop.grid.length) initMergeDropGrid();
      let html = `<div class="merge-drop-board" id="mergeDropBoard">`;
      for (let r = 0; r < MERGE_DROP_ROWS; r++) {
        for (let c = 0; c < MERGE_DROP_COLS; c++) {
          let idx = mergeDrop.grid[r][c];
          let active = false;
          if (mergeDrop.current && mergeDrop.current.r === r && mergeDrop.current.c === c) {
            idx = mergeDrop.current.item;
            active = true;
          }
          html += `<div class="drop-cell ${active ? "active" : ""}">${idx !== null && idx !== undefined ? itemImageHTML(idx, "drop-item-img") : ""}</div>`;
        }
      }
      html += `</div>`;
      return html;
    }

    function renderMergeDropControls() {
      return `
        <div class="drop-controls">
          <button class="drop-control-btn" onclick="moveMergeDrop(-1)">⬅️</button>
          <button class="drop-control-btn" onclick="softDropMergeDrop()">⬇️</button>
          <button class="drop-control-btn" onclick="moveMergeDrop(1)">➡️</button>
          <button class="drop-control-btn" onclick="hardDropMergeDrop()">⏬</button>
        </div>`;
    }

    function initMergeDropGrid() {
      mergeDrop.grid = Array.from({ length: MERGE_DROP_ROWS }, () => Array(MERGE_DROP_COLS).fill(null));
    }

    function startMergeDropGame() {
      loadMergeDropUsage();
      if (mergeDrop.playsToday >= MERGE_DROP_MAX_DAILY) {
        setMsg("Merge Drop daily plays are finished. Come back tomorrow.");
        return;
      }
      stopMergeDropTimers();
      mergeDrop.playsToday++;
      saveMergeDropUsage();
      mergeDrop.active = true;
      mergeDrop.over = false;
      mergeDrop.success = false;
      mergeDrop.score = 0;
      mergeDrop.timeLeft = MERGE_DROP_LIMIT;
      initMergeDropGrid();
      spawnMergeDropPiece();
      daily.mini.value++;
      mergeDrop.timer = setInterval(() => {
        if (!mergeDrop.active) return;
        mergeDrop.timeLeft--;
        if (mergeDrop.timeLeft <= 0) finishMergeDrop(false);
        refreshMiniGameIfOpen();
      }, 1000);
      mergeDrop.dropTimer = setInterval(() => {
        if (!mergeDrop.active) return;
        softDropMergeDrop(false);
      }, 700);
      setMsg("Merge Drop started! Reach 2000 points.");
    }

    function stopMergeDropTimers() {
      if (mergeDrop.timer) clearInterval(mergeDrop.timer);
      if (mergeDrop.dropTimer) clearInterval(mergeDrop.dropTimer);
      mergeDrop.timer = null;
      mergeDrop.dropTimer = null;
    }

    function randomMergeDropItem() {
      const openChains = Object.keys(unlockedMachines).filter(ch => unlockedMachines[ch]);
      const chain = openChains[Math.floor(Math.random() * openChains.length)] || "drink";
      const maxLvl = Math.min(discoveredLevel[chain] || 2, 4, getChainLength(chain));
      const lvl = 1 + Math.floor(Math.random() * maxLvl);
      return getChainIndexByLevel(chain, lvl);
    }

    function spawnMergeDropPiece() {
      const c = Math.floor(MERGE_DROP_COLS / 2);
      if (mergeDrop.grid[0][c] !== null) {
        finishMergeDrop(false);
        return;
      }
      mergeDrop.current = { r: 0, c, item: randomMergeDropItem() };
    }

    function moveMergeDrop(dir) {
      if (!mergeDrop.active || !mergeDrop.current) return;
      const nc = mergeDrop.current.c + dir;
      const r = mergeDrop.current.r;
      if (nc < 0 || nc >= MERGE_DROP_COLS) return;
      if (mergeDrop.grid[r][nc] !== null) return;
      mergeDrop.current.c = nc;
      refreshMiniGameIfOpen();
    }

    function softDropMergeDrop(refresh = true) {
      if (!mergeDrop.active || !mergeDrop.current) return;
      const nr = mergeDrop.current.r + 1;
      const c = mergeDrop.current.c;
      if (nr >= MERGE_DROP_ROWS || mergeDrop.grid[nr][c] !== null) {
        lockMergeDropPiece();
      } else {
        mergeDrop.current.r = nr;
      }
      if (refresh) refreshMiniGameIfOpen();
    }

    function hardDropMergeDrop() {
      if (!mergeDrop.active || !mergeDrop.current) return;
      while (mergeDrop.active && mergeDrop.current) {
        const nr = mergeDrop.current.r + 1;
        const c = mergeDrop.current.c;
        if (nr >= MERGE_DROP_ROWS || mergeDrop.grid[nr][c] !== null) break;
        mergeDrop.current.r = nr;
      }
      lockMergeDropPiece();
      refreshMiniGameIfOpen();
    }

    function lockMergeDropPiece() {
      const p = mergeDrop.current;
      if (!p) return;
      mergeDrop.grid[p.r][p.c] = p.item;
      mergeDrop.current = null;
      clearMergeDropRows();
      if (mergeDrop.score >= MERGE_DROP_TARGET) {
        finishMergeDrop(true);
        return;
      }
      spawnMergeDropPiece();
    }

    function clearMergeDropRows() {
      const clear = Array.from({ length: MERGE_DROP_ROWS }, () => Array(MERGE_DROP_COLS).fill(false));
      let cleared = 0;
      let lineBonus = 0;

      for (let r = 0; r < MERGE_DROP_ROWS; r++) {
        let c = 0;
        while (c < MERGE_DROP_COLS) {
          const item = mergeDrop.grid[r][c];
          if (item === null || item === undefined) { c++; continue; }

          let end = c + 1;
          while (end < MERGE_DROP_COLS && mergeDrop.grid[r][end] === item) end++;
          const len = end - c;

          if (len >= 3) {
            for (let x = c; x < end; x++) {
              if (!clear[r][x]) { clear[r][x] = true; cleared++; }
            }
            lineBonus += len >= MERGE_DROP_COLS ? 420 : len * 120;
          }
          c = end;
        }
      }

      if (cleared <= 0) return;

      for (let r = 0; r < MERGE_DROP_ROWS; r++) {
        for (let c = 0; c < MERGE_DROP_COLS; c++) {
          if (clear[r][c]) mergeDrop.grid[r][c] = null;
        }
      }

      applyMergeDropGravity();
      mergeDrop.score += lineBonus + cleared * 20;
      playSound("merge");
    }

    function applyMergeDropGravity() {
      for (let c = 0; c < MERGE_DROP_COLS; c++) {
        const stack = [];
        for (let r = MERGE_DROP_ROWS - 1; r >= 0; r--) {
          const item = mergeDrop.grid[r][c];
          if (item !== null && item !== undefined) stack.push(item);
        }
        for (let r = MERGE_DROP_ROWS - 1; r >= 0; r--) {
          mergeDrop.grid[r][c] = stack.length ? stack.shift() : null;
        }
      }
    }

    function finishMergeDrop(success) {
      if (!mergeDrop.active && !success) return;
      stopMergeDropTimers();
      mergeDrop.active = false;
      mergeDrop.over = !success;
      mergeDrop.success = success;
      mergeDrop.current = null;
      if (success) {
        gems += 6;
        energy = Math.min(maxEnergy, energy + 20);
        famePoints += 20;
        setMsg("Merge Drop success! +6 💎 +20 ⚡ +20 ⭐");
        playSound("upgrade");
        updateAll();
        checkFameRankUp();
      } else {
        setMsg("Merge Drop ended. Target was 2000 points.");
        playSound("error");
      }
      refreshMiniGameIfOpen();
    }

    function refreshMiniGameIfOpen() {
      const sheet = document.getElementById("sheet");
      if (sheet.classList.contains("show") && sheet.dataset.type === "minigame") refreshOpenSheet();
    }

    document.addEventListener("keydown", function(e) {
      if (!mergeDrop.active) return;
      if (e.key === "ArrowLeft") { e.preventDefault(); moveMergeDrop(-1); }
      if (e.key === "ArrowRight") { e.preventDefault(); moveMergeDrop(1); }
      if (e.key === "ArrowDown") { e.preventDefault(); softDropMergeDrop(); }
      if (e.key === " ") { e.preventDefault(); hardDropMergeDrop(); }
    });

    function openInfoPanel() {
      infoPreviewItemIndex = null;
      if (selectedIndex === null || !board[selectedIndex]) {
        setMsg("Select an item or machine first, then tap Info.");
      }
      openSheet("info", null);
    }

    function openOrderItemInfo(itemIndex) {
      infoPreviewItemIndex = itemIndex;
      selectedIndex = null;
      openSheet("info", null);
    }

    function renderInfoPanel() {
      if (infoPreviewItemIndex !== null && items[infoPreviewItemIndex]) {
        const item = items[infoPreviewItemIndex];
        const chain = getChainItems(item.chain);
        const nextIndex = mergeMap[infoPreviewItemIndex];

        return `
          <div class="info-visual-card">
            <div class="info-main-visual">${itemImageHTML(infoPreviewItemIndex, "info-item-img")}</div>
            <div class="info-title-big">${item.name}</div>
            <div class="info-chain-row">
              ${chain.map(i => `<div class="info-chain-step ${i === infoPreviewItemIndex ? "active" : ""}">${itemImageTag(i)}<span>${items[i].name}</span></div>`).join("")}
            </div>
            <div class="info-mini-grid">
              <div class="info-mini-pill">Level ${item.level}</div>
              <div class="info-mini-pill">${nextIndex !== undefined ? "Next: " + items[nextIndex].name : "Max Level ⭐"}</div>
              <div class="info-mini-pill">${item.level <= discoveredLevel[item.chain] ? "Discovered ✓" : "Locked 🔒"}</div>
              <div class="info-mini-pill">Customer Order</div>
            </div>
          </div>`;
      }

      if (selectedIndex === null || !board[selectedIndex]) {
        return `
          <div class="info-visual-card">
            <div class="rank-big">ℹ️</div>
            <div class="info-title-big">Select Something</div>
            <div class="info-mini-grid">
              <div class="info-mini-pill">Tap an item</div>
              <div class="info-mini-pill">Then tap Info</div>
            </div>
          </div>`;
      }

      const data = board[selectedIndex];

      if (data.machine) {
        const type = data.machine;
        const def = machineDefs[type];
        const lvl = machineLevels[type];
        const cost = upgradeCost(type);
        const chain = machineDefs[type].chain;
        const production = getChainItems(chain).slice(0, Math.min(lvl, discoveredLevel[chain], getChainLength(chain)));
        return `
          <div class="info-visual-card">
            <div class="info-main-visual">${machineImageHTML(type, "info-machine-img")}</div>
            <div class="info-title-big">${def.name}</div>
            <div class="info-chain-row">
              ${production.map(i => `<div class="info-chain-step">${itemImageTag(i)}<span>${items[i].name}</span></div>`).join("")}
            </div>
            <div class="info-mini-grid">
              <div class="info-mini-pill">Lv. ${lvl}</div>
              <div class="info-mini-pill">${lvl >= getChainLength(chain) ? "Max Level" : cost + " 🔧 Upgrade"}</div>
              <div class="info-mini-pill">Tap twice to produce</div>
              <div class="info-mini-pill">Drag to move</div>
            </div>
            <button class="${type === "drink" ? "blue-btn" : "orange-btn"}" onclick="upgradeMachine('${type}'); refreshOpenSheet();" ${lvl >= getChainLength(chain) ? "disabled" : ""}>${lvl >= getChainLength(chain) ? "Max Level" : "Upgrade Machine"}</button>
          </div>`;
      }

      const item = items[data.item];
      const chain = getChainItems(item.chain);
      const nextIndex = mergeMap[data.item];

      return `
        <div class="info-visual-card">
          <div class="info-main-visual">${itemImageHTML(data.item, "info-item-img")}</div>
          <div class="info-title-big">${item.name}</div>
          <div class="info-chain-row">
            ${chain.map(i => `<div class="info-chain-step ${i === data.item ? "active" : ""}">${itemImageTag(i)}<span>${items[i].name}</span></div>`).join("")}
          </div>
          <div class="info-mini-grid">
            <div class="info-mini-pill">Level ${item.level}</div>
            <div class="info-mini-pill">${nextIndex !== undefined ? "Next: " + items[nextIndex].name : "Max Level ⭐"}</div>
            <div class="info-mini-pill">${item.level <= discoveredLevel[item.chain] ? "Discovered ✓" : "Locked 🔒"}</div>
            <div class="info-mini-pill">${data.lucky ? "Lucky ✨" : data.chainBadge ? "Special ⭐" : "Merge Item"}</div>
          </div>
        </div>`;
    }

    function itemImageTag(itemIndex) {
      const item = items[itemIndex];
      if (!item || !item.img) return `<span>${item ? item.emoji : ""}</span>`;
      return `<img src="${item.img}" alt="${item.name}" draggable="false" onerror="this.outerHTML='${item.emoji}'">`;
    }

    function getMachineProductionText(type) {
      const chain = machineDefs[type].chain;
      const max = Math.min(machineLevels[type], discoveredLevel[chain], getChainLength(chain));
      const names = [];
      for (let lvl = 1; lvl <= max; lvl++) {
        const itemIndex = getChainIndexByLevel(chain, lvl);
        names.push(itemImageHTML(itemIndex, "order-icon-img") + " " + items[itemIndex].name);
      }
      return names.join(", ");
    }

    function upgradeMachine(type) {
      const lvl = machineLevels[type];

      if (lvl >= getChainLength(machineDefs[type].chain)) {
        setMsg("Machine already max.");
        return;
      }

      const cost = upgradeCost(type);
      if (parts < cost) {
        setMsg("Need " + cost + " 🔧.");
        playSound("error");
        return;
      }

      parts -= cost;
      machineLevels[type]++;
      energy = Math.min(maxEnergy, energy + 10);
      famePoints += 10;

      setMsg(machineDefs[type].name + " upgraded! +10 ⚡ +10 ⭐");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
    }

    function upgradeCost(type) {
      const lvl = machineLevels[type];
      const costs = { 1: 3, 2: 6, 3: 10, 4: 15, 5: 22 };
      return costs[lvl] || 999;
    }

    function checkFameRankUp() {
      let rankedUp = false;
      let rewardHTML = "";

      while (fameRanks[fameRank + 1] && famePoints >= fameRanks[fameRank + 1].need) {
        fameRank++;
        cafeLevel = fameRank + 1;
        rankedUp = true;

        if (fameRank === 1) { energy = Math.min(maxEnergy, energy + 10); parts += 1; gems += 5; }
        if (fameRank === 2) { energy = Math.min(maxEnergy, energy + 15); parts += 2; }
        if (fameRank === 3) { energy = Math.min(maxEnergy, energy + 20); gems += 10; }
        if (fameRank === 4) { energy = Math.min(maxEnergy, energy + 25); gems += 20; }
        if (fameRank === 5) { maxEnergy += 10; energy = Math.min(maxEnergy, energy + 10); }
        if (fameRank === 10) { energy = Math.min(maxEnergy, energy + 20); parts += 3; }
        if (fameRank === 15) { maxEnergy += 20; energy = Math.min(maxEnergy, energy + 25); }
        if (fameRank === 18) { energy = Math.min(maxEnergy, energy + 40); gems += 30; }

        rewardHTML = rankRewardHTML(fameRank);
      }

      if (rankedUp) {
        updateAchievements();
        showGameModal("🏆", "New Fame Rank Unlocked!", fameRanks[fameRank].name, rewardHTML);
        playSound("upgrade");
        updateAll();
      }
    }

    function claimGift() {
      if (!giftReady) return;
      energy = Math.min(maxEnergy, energy + 8);
      giftProgress = 0;
      giftStage++;
      giftTarget = giftStage === 1 ? 5 : 10;
      giftReady = false;
      setMsg("Gift claimed! +8 ⚡");
      playSound("upgrade");
      updateAll();
    }

    function recycleSelected() {
      if (selectedIndex === null || !board[selectedIndex]) {
        setMsg("Select an item first, then recycle.");
        playSound("error");
        return;
      }

      const obj = board[selectedIndex];
      if (obj.machine) {
        setMsg("Machines cannot be recycled.");
        playSound("error");
        return;
      }

      const lvl = items[obj.item].level;
      const coinMap = { 1: 1, 2: 2, 3: 4, 4: 7, 5: 10, 6: 15 };
      const gain = coinMap[lvl] || Math.min(15, lvl * 2);
      board[selectedIndex] = null;
      selectedIndex = null;
      coins += gain;

      setMsg("Recycled! +" + gain + " 🪙");
      playSound("upgrade");
      updateAll();
    }

    function watchAd() {
      if (adCooldown) return;

      let seconds = 5;
      setMsg("Ad break... 5s");
      adCooldown = true;

      const countdown = setInterval(() => {
        seconds--;
        setMsg("Ad break... " + seconds + "s");

        if (seconds <= 0) {
          clearInterval(countdown);
          energy = Math.min(maxEnergy, energy + 15);
          setMsg("Ad reward! +15 ⚡");
          playSound("upgrade");
          startAdCooldown();
          updateAll();
          if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
        }
      }, 1000);
    }

    function startAdCooldown() {
      adCooldownSeconds = 60;
      if (adTimer) clearInterval(adTimer);

      adTimer = setInterval(() => {
        adCooldownSeconds--;
        if (adCooldownSeconds <= 0) {
          clearInterval(adTimer);
          adCooldown = false;
        }
        if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
      }, 1000);
    }

    function firstEmptyCell() {
      return board.findIndex(x => x === null);
    }

    function showGameModal(icon, title, name, reward) {
      document.getElementById("modalIcon").textContent = icon;
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalName").innerHTML = name;
      document.getElementById("modalReward").innerHTML = reward;
      document.getElementById("gameModal").classList.add("show");
      spawnConfetti();
    }

    function closeGameModal() {
      document.getElementById("gameModal").classList.remove("show");
      document.querySelectorAll(".confetti").forEach(x => x.remove());
    }

    function spawnConfetti() {
      const card = document.getElementById("modalCard");
      document.querySelectorAll(".confetti").forEach(x => x.remove());
      const icons = ["⭐", "✨", "🎉", "🪙", "💎"];

      for (let i = 0; i < 22; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.textContent = icons[Math.floor(Math.random() * icons.length)];

        c.style.animationDelay = (Math.random() * 0.3) + "s";
        card.appendChild(c);
      }
    }

    function cloneSimple(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function serializeCustomers() {
      return customers.map(c => ({
        profileId: c.profile && c.profile.id ? c.profile.id : "luna",
        orders: Array.isArray(c.orders) ? c.orders.slice() : [],
        givesPart: !!c.givesPart
      }));
    }

    function restoreCustomers(savedCustomers) {
      if (!Array.isArray(savedCustomers)) return [];
      return savedCustomers.map(c => {
        const profile = storyProfiles.find(p => p.id === c.profileId) || storyProfiles[0];
        const orders = Array.isArray(c.orders) ? c.orders.filter(i => items[i]) : [];
        return { profile, orders: orders.length ? orders : generateUniqueOrders(profile), givesPart: !!c.givesPart };
      }).filter(Boolean);
    }

    function serializeStories() {
      return storyProfiles.map(p => ({ id: p.id, visits: p.visits || 0, unlocked: p.unlocked || 0 }));
    }

    function restoreStories(savedStories) {
      if (!Array.isArray(savedStories)) return;
      savedStories.forEach(s => {
        const p = storyProfiles.find(x => x.id === s.id);
        if (!p) return;
        p.visits = Math.max(0, Number(s.visits) || 0);
        p.unlocked = Math.max(0, Math.min(3, Number(s.unlocked) || 0));
      });
    }

    function mergeTaskState(target, saved) {
      if (!saved || typeof saved !== "object") return;
      Object.keys(target).forEach(k => {
        if (!saved[k]) return;
        target[k].value = Number(saved[k].value) || 0;
        target[k].claimed = !!saved[k].claimed;
      });
    }

    function saveGame() {
      try {
        const data = {
          version: 5,
          savedAt: Date.now(),
          coins, gems, parts, energy, maxEnergy, cafeLevel, famePoints, fameRank, totalServed, customerSlots,
          board: cloneSimple(board),
          customers: serializeCustomers(),
          storyProgress: serializeStories(),
          unlockedMachines: cloneSimple(unlockedMachines),
          machineLevels: cloneSimple(machineLevels),
          discoveredLevel: cloneSimple(discoveredLevel),
          researchCost: cloneSimple(researchCost),
          giftProgress, giftStage, giftTarget, giftReady, ordersSinceLastPart,
          recentOrderKeys: recentOrderKeys.slice(),
          recentOrderChains: recentOrderChains.slice(),
          daily: cloneSimple(daily),
          achievements: cloneSimple(achievements),
          lastEnergyTime: Number(localStorage.getItem("mmc_lastEnergyTime")) || Date.now(),
          mergeDropDate: localStorage.getItem("mmc_mergeDropDate") || todayKey(),
          mergeDropPlays: Number(localStorage.getItem("mmc_mergeDropPlays")) || 0
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      } catch(e) {}
    }

    function loadGame() {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get("reset") === "1") {
          localStorage.removeItem(SAVE_KEY);
          localStorage.removeItem("mmc_lastEnergyTime");
          localStorage.removeItem("mmc_energy");
          localStorage.removeItem("mmc_maxEnergy");
          localStorage.removeItem("mmc_giftStage");
          localStorage.removeItem("mmc_giftTarget");
          localStorage.removeItem("mmc_mergeDropDate");
          localStorage.removeItem("mmc_mergeDropPlays");
          return false;
        }

        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data || typeof data !== "object") return false;

        coins = Number(data.coins) || 0;
        gems = Number.isFinite(Number(data.gems)) ? Number(data.gems) : 25;
        parts = Number(data.parts) || 0;
        maxEnergy = Math.max(25, Number(data.maxEnergy) || 100);
        energy = Math.max(0, Math.min(maxEnergy, Number.isFinite(Number(data.energy)) ? Number(data.energy) : 25));
        cafeLevel = Number(data.cafeLevel) || 1;
        famePoints = Number(data.famePoints) || 0;
        fameRank = Math.max(0, Math.min(fameRanks.length - 1, Number(data.fameRank) || 0));
        totalServed = Number(data.totalServed) || 0;
        customerSlots = Math.max(3, Math.min(MAX_CUSTOMER_SLOTS, Number(data.customerSlots) || 3));

        if (Array.isArray(data.board) && data.board.length === boardSize) board = data.board;
        if (data.unlockedMachines) Object.assign(unlockedMachines, data.unlockedMachines);
        if (data.machineLevels) Object.assign(machineLevels, data.machineLevels);
        if (data.discoveredLevel) Object.assign(discoveredLevel, data.discoveredLevel);
        if (data.researchCost) Object.assign(researchCost, data.researchCost);

        restoreStories(data.storyProgress);
        giftProgress = Number(data.giftProgress) || 0;
        giftStage = Number(data.giftStage) || 0;
        giftTarget = Math.max(3, Number(data.giftTarget) || 3);
        giftReady = !!data.giftReady;
        ordersSinceLastPart = Number(data.ordersSinceLastPart) || 0;
        recentOrderKeys = Array.isArray(data.recentOrderKeys) ? data.recentOrderKeys.slice(-10) : [];
        recentOrderChains = Array.isArray(data.recentOrderChains) ? data.recentOrderChains.slice(-10) : [];
        mergeTaskState(daily, data.daily);
        mergeTaskState(achievements, data.achievements);

        customers = restoreCustomers(data.customers);
        refillCustomerDeck();
        while (customers.length < customerSlots) customers.push(newCustomer());
        if (customers.length > customerSlots) customers = customers.slice(0, customerSlots);

        if (data.lastEnergyTime) localStorage.setItem("mmc_lastEnergyTime", String(data.lastEnergyTime));
        if (data.mergeDropDate) localStorage.setItem("mmc_mergeDropDate", String(data.mergeDropDate));
        if (Number.isFinite(Number(data.mergeDropPlays))) localStorage.setItem("mmc_mergeDropPlays", String(data.mergeDropPlays));

        loadedExistingSave = true;
        return true;
      } catch(e) {
        console.warn("Save load failed", e);
        return false;
      }
    }

    function startNewGame() {
      coins = 0;
      gems = 25;
      parts = 0;
      energy = 25;
      maxEnergy = 100;
      cafeLevel = 1;
      famePoints = 0;
      fameRank = 0;
      totalServed = 0;
      customerSlots = 3;
      board = Array(boardSize).fill(null);
      board[5] = { machine: "drink" };
      board[24] = { machine: "dessert" };
      customers = [];
      giftProgress = 0;
      giftStage = 0;
      giftTarget = 3;
      giftReady = false;
      ordersSinceLastPart = 0;
      unlockedMachines = { drink: true, dessert: true, bakery: false, tea: false, juice: false, ice: false };
      machineLevels = { drink: 1, dessert: 1, bakery: 1, tea: 1, juice: 1, ice: 1 };
      discoveredLevel = { drink: 3, dessert: 3, bakery: 2, tea: 2, juice: 2, ice: 2 };
      researchCost = { drink: 120, dessert: 120, bakery: 150, tea: 170, juice: 180, ice: 200 };
      storyProfiles.forEach(p => { p.visits = 0; p.unlocked = 0; });
      localStorage.setItem("mmc_lastEnergyTime", String(Date.now()));
      setupCustomers();
    }

    function updateAll() {
      cafeLevel = fameRank + 1;
      document.getElementById("coinsText").textContent = "🪙 " + coins;
      document.getElementById("gemsText").textContent = "💎 " + gems;
      document.getElementById("partsText").textContent = "🔧 " + parts;
      document.getElementById("energyText").textContent = "⚡ " + energy + "/" + maxEnergy;
      updateEnergyHomeTimer();
      giftReady = giftProgress >= giftTarget;
      persistEnergyState();
      saveGame();
      createBoard();
      createCustomers();
      updateAchievements();
    }

    document.addEventListener("dragstart", e => e.preventDefault());

    const hadSave = loadGame();
    if (!hadSave) startNewGame();
    applyOfflineEnergyRegen();
    loadMergeDropUsage();
    updateAll();
    setInterval(tickEnergyRegen, 1000);
    setMsg(hadSave ? "Welcome back! Your cafe progress was loaded." : "Welcome! Start with 25 energy and grow your cafe!");
  </script>
</body>
</html>
