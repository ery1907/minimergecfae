<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mini Merge Cafe</title>
  <!-- MINI_MERGE_UI_FIX_V3 -->

  <style>
    * {
      box-sizing: border-box;
      font-family: "Trebuchet MS", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #fff8d9 0, transparent 34%),
        radial-gradient(circle at bottom right, #ffd2dc 0, transparent 36%),
        linear-gradient(180deg, #fff3e8, #ffdcbf);
      color: #5a3825;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    button {
      font-weight: 900;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 12px 12px 94px;
      background:
        linear-gradient(rgba(255, 243, 232, 0.88), rgba(255, 243, 232, 0.94)),
        radial-gradient(circle at 8% 16%, rgba(76, 175, 122, 0.14), transparent 24%),
        radial-gradient(circle at 92% 50%, rgba(255, 159, 67, 0.16), transparent 24%);
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      background: rgba(255,255,255,0.85);
      border: 2px solid #f4cf9c;
      border-radius: 26px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.12);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff3e8;
      border: 3px solid #d69456;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      box-shadow: inset 0 2px 8px rgba(90,56,37,0.12);
    }

    h1 {
      margin: 0;
      flex: 1;
      text-align: center;
      font-size: 25px;
      color: #653719;
      letter-spacing: 1px;
    }

    .gear {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff8ef;
      border: 2px solid #f1c27d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      box-shadow: 0 4px 10px rgba(90,56,37,0.12);
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat-pill {
      background: #fff8ef;
      border: 2px solid #f1c27d;
      border-radius: 18px;
      padding: 8px 5px;
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(90,56,37,0.06);
      white-space: nowrap;
    }

    .orders-section {
      background: rgba(255,255,255,0.88);
      border: 2px solid #f4cf9c;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.1);
      margin-bottom: 13px;
    }

    .section-ribbon {
      width: fit-content;
      margin: -25px auto 10px;
      background: linear-gradient(180deg, #ff8fa8, #ef5d7a);
      color: white;
      padding: 8px 28px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 5px 12px rgba(90,56,37,0.18);
      border: 2px solid rgba(255,255,255,0.55);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .customers {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px 6px;
      scroll-snap-type: x mandatory;
    }

    .customers::-webkit-scrollbar {
      display: none;
    }

    .customer-card {
      min-width: 206px;
      background: linear-gradient(180deg, #fff9f2, #fff0df);
      border: 2px solid #f1c27d;
      border-radius: 22px;
      padding: 10px;
      box-shadow: 0 6px 14px rgba(90,56,37,0.11);
      scroll-snap-align: start;
      position: relative;
      transition: 0.2s;
      overflow: hidden;
    }

    .customer-card.ready {
      border-color: #34c759;
      box-shadow: 0 0 0 3px rgba(52,199,89,0.18), 0 0 18px rgba(52,199,89,0.28), 0 6px 14px rgba(90,56,37,0.12);
      animation: readyPulse 1.1s infinite ease-in-out;
    }

    @keyframes readyPulse {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-2px) scale(1.02); }
    }

    .ready-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #4caf7a;
      color: white;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      z-index: 4;
    }

    .customer-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .portrait-ring {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(180deg, #ffddb5, #f1b56f);
      box-shadow: 0 4px 10px rgba(90,56,37,0.15);
      flex-shrink: 0;
    }

    .portrait-ring img {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      object-fit: cover;
      display: block;
      background: #fff7ee;
    }

    .customer-meta {
      min-width: 0;
      flex: 1;
    }

    .customer-name {
      font-size: 15px;
      font-weight: 900;
      color: #653719;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .customer-trait {
      font-size: 11px;
      font-weight: 800;
      color: #9c6a3f;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .customer-mood {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff6e7;
      border: 1px solid #f1d3a5;
      color: #8b5e34;
      font-size: 10px;
      font-weight: 900;
    }

    .order-block {
      background: rgba(255,255,255,0.85);
      border: 2px solid #f2d1a5;
      border-radius: 16px;
      padding: 9px;
      margin-bottom: 8px;
    }

    .order-label {
      font-size: 10px;
      color: #9e6b42;
      font-weight: 900;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .order-emoji {
      font-size: 25px;
      min-height: 30px;
      margin-bottom: 3px;
    }

    .order-name {
      font-weight: 900;
      font-size: 13px;
      line-height: 1.2;
      color: #653719;
    }

    .reward {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-weight: 900;
      font-size: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .reward span {
      background: #fff8ef;
      border: 1px solid #f1d3a5;
      border-radius: 999px;
      padding: 4px 7px;
    }

    .serve-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
      box-shadow: 0 4px 0 #2c761d;
      color: white;
      padding: 8px 10px;
      border-radius: 13px;
      font-size: 14px;
      width: 100%;
    }

    .serve-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2c761d;
    }

    .board-frame {
      background: linear-gradient(180deg, #bc7337, #8c4d27);
      border-radius: 28px;
      padding: 12px;
      border: 4px solid #6f391b;
      box-shadow:
        inset 0 4px 8px rgba(255,255,255,0.25),
        inset 0 -8px 12px rgba(0,0,0,0.18),
        0 10px 22px rgba(90,56,37,0.25);
      margin-bottom: 12px;
    }

    .board-label {
      width: fit-content;
      margin: -2px auto 10px;
      background: linear-gradient(180deg, #9a552b, #713717);
      color: white;
      padding: 8px 38px;
      border-radius: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.18);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      background: rgba(90,56,37,0.13);
      border-radius: 20px;
      padding: 8px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, #fff1d9, #f7d5aa);
      border: 2px solid #e4af74;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 30px;
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.6),
        inset 0 -3px 6px rgba(90,56,37,0.09);
      cursor: pointer;
      transition: 0.16s;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell.selected {
      outline: 4px solid #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.75);
    }

    .cell.drag-over {
      outline: 4px solid #4caf7a;
    }

    .machine {
      color: white;
      border: 3px solid #5a3825;
      box-shadow: 0 5px 12px rgba(90,56,37,0.25);
    }

    .drink-machine { background: linear-gradient(180deg, #79c7e8, #2e8ebb); }
    .dessert-machine { background: linear-gradient(180deg, #ffb6c8, #e6789a); }
    .bakery-machine { background: linear-gradient(180deg, #e9b872, #b76b26); }
    .tea-machine { background: linear-gradient(180deg, #9be37d, #3f9b45); }
    .juice-machine { background: linear-gradient(180deg, #ffb24a, #ef6f2e); }
    .ice-machine { background: linear-gradient(180deg, #b7e6ff, #5aa9d6); }

    .machine-label,
    .item-name {
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 6.4px;
      font-weight: 900;
      color: #5a3825;
      pointer-events: none;
    }

    .machine-label {
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }

    .item {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      touch-action: none;
      animation: itemFloat 2s infinite ease-in-out;
    }

    @keyframes itemFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .pop { animation: pop 0.35s ease-out; }

    @keyframes pop {
      0% { transform: scale(0.2) rotate(-12deg); opacity: 0; }
      65% { transform: scale(1.18) rotate(5deg); opacity: 1; }
      100% { transform: scale(1); }
    }

    .lucky-cell {
      border-color: #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.8);
      background: linear-gradient(180deg, #fff5bd, #ffd36e);
    }

    .mini-badge {
      position: absolute;
      top: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border: 2px solid white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      z-index: 3;
    }

    .badge-lucky { left: -8px; background: #ffb703; }
    .badge-star { left: 16px; background: #8338ec; }
    .badge-ready { right: -8px; background: #4caf7a; }

    .hint-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #f4cf9c;
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 6px 14px rgba(90,56,37,0.12);
    }

    .helper { font-size: 34px; }
    .message { flex: 1; font-weight: 900; font-size: 14px; line-height: 1.35; }
    .bulb { font-size: 27px; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: min(456px, calc(100% - 18px));
      background: rgba(255,248,239,0.96);
      border: 2px solid #f1c27d;
      border-radius: 26px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 7px;
      box-shadow: 0 -8px 24px rgba(90,56,37,0.18);
      z-index: 50;
    }

    .nav-btn {
      background: transparent;
      color: #5a3825;
      border: none;
      box-shadow: none;
      padding: 7px 4px;
      border-radius: 18px;
      font-size: 24px;
      font-weight: 900;
    }

    .nav-btn.active {
      background: linear-gradient(180deg, #ffb6c8, #ff8fa8);
      color: #7b2b42;
    }

    .nav-btn span {
      display: block;
      font-size: 11px;
      margin-top: 2px;
    }

    .sheet {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -100%;
      width: min(456px, 100%);
      max-height: 76vh;
      background: #fff8ef;
      border-radius: 28px 28px 0 0;
      border: 3px solid #f1c27d;
      box-shadow: 0 -14px 35px rgba(90,56,37,0.28);
      padding: 16px;
      z-index: 80;
      overflow-y: auto;
      transition: bottom 0.28s ease;
    }

    .sheet.show { bottom: 0; }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 13px;
    }

    .sheet-header h2 {
      margin: 0;
      font-size: 22px;
      color: #653719;
    }

    .close-btn {
      width: auto;
      background: #ff8fa8;
      border: 2px solid #d95776;
      padding: 8px 13px;
      border-radius: 14px;
      color: white;
      font-weight: 900;
    }

    .panel-card,
    .story-card,
    .unlock-card,
    .order-row,
    .task-card {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 20px;
      padding: 13px;
      margin-bottom: 11px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
    }

    .panel-card h3,
    .task-card h3 {
      margin: 0 0 8px;
      color: #653719;
      font-size: 18px;
    }

    .panel-card p,
    .task-card p {
      margin: 5px 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .green-btn,
    .orange-btn,
    .blue-btn,
    .purple-btn {
      color: white;
      border-radius: 14px;
      padding: 10px;
      width: 100%;
      margin-top: 7px;
      font-weight: 900;
    }

    .green-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
    }

    .orange-btn {
      background: linear-gradient(180deg, #ffb24a, #ff8c1a);
      border: 2px solid #d96e00;
    }

    .blue-btn {
      background: linear-gradient(180deg, #79c7e8, #2e8ebb);
      border: 2px solid #1c6f97;
    }

    .purple-btn {
      background: linear-gradient(180deg, #b28dff, #7c4dff);
      border: 2px solid #5c35c9;
    }

    .task-progress {
      height: 12px;
      background: #f3cfa1;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #d69456;
      margin-top: 8px;
    }

    .task-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf7a, #a9e34b);
      border-radius: 999px;
    }

    .story-top,
    .order-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .story-avatar,
    .order-avatar {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      padding: 3px;
      background: linear-gradient(180deg, #ffe0b8, #efb06f);
      flex-shrink: 0;
    }

    .story-avatar img,
    .order-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 13px;
      object-fit: cover;
      display: block;
      background: #fff7ee;
    }

    .story-body,
    .order-body {
      flex: 1;
      min-width: 0;
    }

    .story-title,
    .order-title {
      font-size: 15px;
      font-weight: 900;
      color: #653719;
    }

    .story-meta,
    .order-meta {
      font-size: 12px;
      font-weight: 900;
      color: #8b5e34;
      margin-top: 2px;
      line-height: 1.25;
    }

    .story-text,
    .info-note {
      margin-top: 8px;
      padding: 9px;
      border-radius: 14px;
      background: #fff7e8;
      color: #5a3825;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 800;
    }

    .small-action-btn {
      background: linear-gradient(180deg, #ffb24a, #ff8c1a);
      border: 2px solid #d96e00;
      color: white;
      border-radius: 13px;
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 900;
      min-width: 88px;
    }

    .ready-serve-mini {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
      color: white;
      border-radius: 13px;
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 900;
      min-width: 78px;
    }

    .fame-hero {
      background: linear-gradient(180deg, #fff7e8, #ffe0b3);
      border: 2px solid #f1c27d;
      border-radius: 22px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
      text-align: center;
    }

    .fame-rank-title {
      font-size: 22px;
      font-weight: 900;
      color: #653719;
      margin-bottom: 4px;
    }

    .fame-rank-sub {
      font-size: 13px;
      font-weight: 900;
      color: #8b5e34;
      margin-bottom: 10px;
    }

    .fame-bar {
      height: 14px;
      background: #f3cfa1;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #d69456;
    }

    .fame-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffb703, #ff8c1a);
      border-radius: 999px;
      transition: width 0.45s ease;
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: rgba(255, 248, 239, 0.96);
      border: 3px solid #f1c27d;
      box-shadow: 0 16px 28px rgba(90,56,37,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(420px, 100%);
      background: #fff8ef;
      border: 4px solid #ffb703;
      border-radius: 30px;
      padding: 22px 16px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      animation: rankPop 0.4s ease-out;
      position: relative;
      overflow: hidden;
    }

    @keyframes rankPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .rank-big { font-size: 58px; margin-bottom: 8px; }
    .rank-title { font-size: 27px; font-weight: 900; color: #653719; margin-bottom: 6px; }
    .rank-name { font-size: 20px; font-weight: 900; color: #ff8c1a; margin-bottom: 10px; }
    .rank-reward {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 18px;
      padding: 10px;
      margin: 10px 0;
      color: #5a3825;
      font-weight: 900;
      line-height: 1.4;
    }

    .confetti {
      position: absolute;
      font-size: 22px;
      animation: confettiFall 1.2s ease-in forwards;
      pointer-events: none;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(260px) rotate(220deg); opacity: 0; }
    }

    .mini-game-area {
      height: 240px;
      background: linear-gradient(180deg, #fff7e8, #ffe1bf);
      border: 3px solid #f1c27d;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }

    .stain-dot {
      position: absolute;
      width: 56px;
      height: 46px;
      border-radius: 18px;
      background: rgba(255,255,255,0.85);
      border: 3px solid #ffb703;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      box-shadow: 0 0 14px rgba(255,183,3,0.5);
    }

    .rush-sequence {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 30px;
    }

    .rush-btn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .rush-btn {
      background: #fff3e8;

    function getChainLength(chain) {
      return items.filter(item => item.chain === chain).reduce((max, item) => Math.max(max, item.level || 0), 0) || CHAIN_LENGTH;
    }

    function getChainIndexByLevel(chain, level) {
      const idx = items.findIndex(item => item.chain === chain && item.level === level);
      return idx >= 0 ? idx : chainStart[chain] + level - 1;
    }

    function getChainItems(chain) {
      return items
        .map((item, index) => ({ item, index }))
        .filter(x => x.item.chain === chain)
        .sort((a, b) => a.item.level - b.item.level)
        .map(x => x.index);
    }

    function installMobileZoomLock() {
      let lastTapTime = 0;
      let lastTapX = 0;
      let lastTapY = 0;

      function isBoardTap(e) {
        const t = e.target;
        return !!(t && t.closest && t.closest(".board-frame, .board, .cell, .machine, .item, .asset-wrap, .machine-img, .item-img"));
      }

      function lockTapZoom(e) {
        if (!isBoardTap(e)) return;
        const touch = e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : null;
        const x = touch ? touch.clientX : 0;
        const y = touch ? touch.clientY : 0;
        const now = Date.now();
        const closeTap = Math.abs(x - lastTapX) < 34 && Math.abs(y - lastTapY) < 34;

        if (now - lastTapTime < 420 && closeTap) {
          e.preventDefault();
          e.stopPropagation();
          if (e.stopImmediatePropagation) e.stopImmediatePropagation();
        }

        lastTapTime = now;
        lastTapX = x;
        lastTapY = y;
      }

      function blockBoardDefault(e) {
        if (isBoardTap(e)) e.preventDefault();
      }

      document.addEventListener("touchstart", lockTapZoom, { passive: false, capture: true });
      document.addEventListener("touchend", lockTapZoom, { passive: false, capture: true });
      document.addEventListener("dblclick", function(e) {
        if (isBoardTap(e)) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false, capture: true });
      document.addEventListener("gesturestart", blockBoardDefault, { passive: false, capture: true });
      document.addEventListener("gesturechange", blockBoardDefault, { passive: false, capture: true });
      document.addEventListener("gestureend", blockBoardDefault, { passive: false, capture: true });
    }

      if (!loadedExistingSave) {
        const savedEnergy = Number(localStorage.getItem("mmc_energy"));
        const savedMaxEnergy = Number(localStorage.getItem("mmc_maxEnergy"));
        const savedGiftStage = Number(localStorage.getItem("mmc_giftStage"));
        const savedGiftTarget = Number(localStorage.getItem("mmc_giftTarget"));

        if (!Number.isNaN(savedMaxEnergy) && savedMaxEnergy >= maxEnergy) maxEnergy = savedMaxEnergy;
        if (!Number.isNaN(savedEnergy) && savedEnergy >= 0) energy = Math.min(savedEnergy, maxEnergy);
        if (energy < 25) energy = 25;
        if (!Number.isNaN(savedGiftStage) && savedGiftStage >= 0) giftStage = savedGiftStage;
        if (!Number.isNaN(savedGiftTarget) && savedGiftTarget >= 3) giftTarget = savedGiftTarget;
      }

      let last = Number(localStorage.getItem("mmc_lastEnergyTime"));
      if (!last || Number.isNaN(last)) {
        localStorage.setItem("mmc_lastEnergyTime", String(now));
        return;
      }

      if (energy >= maxEnergy) {
        localStorage.setItem("mmc_lastEnergyTime", String(now));
        return;
      }

      const gained = Math.floor((now - last) / energyRegenMs);
      if (gained > 0) {
        energy = Math.min(maxEnergy, energy + gained);
        localStorage.setItem("mmc_lastEnergyTime", String(last + gained * energyRegenMs));
      }
    }

    function tickEnergyRegen() {
      energyRegenMs = getEnergyRegenMs();
      const now = Date.now();
      let last = Number(localStorage.getItem("mmc_lastEnergyTime")) || now;

      if (energy >= maxEnergy) {
        nextEnergySeconds = 0;
        localStorage.setItem("mmc_lastEnergyTime", String(now));
        updateEnergyHomeTimer();
        return;
      }

      const diff = now - last;
      const gained = Math.floor(diff / energyRegenMs);
      if (gained > 0) {
        energy = Math.min(maxEnergy, energy + gained);
        localStorage.setItem("mmc_lastEnergyTime", String(last + gained * energyRegenMs));
        updateAll();
        return;
      }

      nextEnergySeconds = Math.max(0, Math.ceil((energyRegenMs - diff) / 1000));
      updateEnergyHomeTimer();
      const sheet = document.getElementById("sheet");
      if (sheet && sheet.classList.contains("show") && sheet.dataset.type === "gift") refreshOpenSheet();
    }

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = type === "error" ? 180 : type === "order" ? 760 : type === "merge" ? 520 : 900;
        gain.gain.setValueAtTime(0.06, ctx.currentTime);

    function pointerDown(e) {
      const index = Number(e.currentTarget.dataset.index);
      const data = board[index];

      if (!data && selectedIndex === null) return;

      e.preventDefault();

      pointerDrag.pointerId = e.pointerId;
      pointerDrag.from = index;
      pointerDrag.startX = e.clientX;
      pointerDrag.startY = e.clientY;
      pointerDrag.active = false;
      pointerDrag.moved = false;
      pointerDrag.target = null;

      try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}

      window.addEventListener("pointermove", pointerMove, { passive: false });
      window.addEventListener("pointerup", pointerUp, { passive: false });
      window.addEventListener("pointercancel", pointerCancel, { passive: false });
    }

    function pointerMove(e) {
      if (e.pointerId !== pointerDrag.pointerId) return;
      e.preventDefault();

      const dx = e.clientX - pointerDrag.startX;
      const dy = e.clientY - pointerDrag.startY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (!pointerDrag.active && dist > 8 && board[pointerDrag.from]) {
        startPointerDrag(e);
      }

      if (!pointerDrag.active) return;

      pointerDrag.moved = true;
      moveGhost(e.clientX, e.clientY);

      const cell = cellFromPoint(e.clientX, e.clientY);
      document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));

      if (cell) {
        const target = Number(cell.dataset.index);
        if (target !== pointerDrag.from) {
          pointerDrag.target = target;
          cell.classList.add("drag-over");
        } else {
          pointerDrag.target = null;
        }
      } else {
        pointerDrag.target = null;
      }
    }

    function pointerUp(e) {
      if (e.pointerId !== pointerDrag.pointerId) return;
      e.preventDefault();

      const wasDragging = pointerDrag.active && pointerDrag.moved;
      const from = pointerDrag.from;
      const target = pointerDrag.target;

      cleanupPointerDrag();

      if (wasDragging && target !== null && target !== undefined) {
        moveOrMerge(from, target);
        updateAll();
      } else {
        handleBoardTap(from);
      }

      resetPointerDrag();
      removePointerListeners();
    }

    function pointerCancel() {
      cleanupPointerDrag();
      resetPointerDrag();
      removePointerListeners();
    }

    function removePointerListeners() {
      window.removeEventListener("pointermove", pointerMove);
      window.removeEventListener("pointerup", pointerUp);
      window.removeEventListener("pointercancel", pointerCancel);
    }

    function startPointerDrag(e) {
      const data = board[pointerDrag.from];
      if (!data) return;

      const ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.innerHTML = getBoardObjectVisual(data);
      document.body.appendChild(ghost);

    function moveGhost(x, y) {

    function cellFromPoint(x, y) {

    function cleanupPointerDrag() {

      document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));

    function resetPointerDrag() {
      pointerDrag.pointerId = null;

    function handleBoardTap(index) {
      infoPreviewItemIndex = null;

        selectedIndex = index;

    function tapCell(index) {

    function moveOrMerge(from, to) {
      const a = board[from];
      const b = board[to];

      if (!a) return;

      if (!b) {
        board[to] = a;
        board[from] = null;
        selectedIndex = to;
        setMsg(a.machine ? "Machine moved." : "Item moved.");
        return;
      }

      if (a.machine || b.machine) {
        setMsg("Machines can move, but they do not merge.");
        playSound("error");
        return;
      }

      if (a.item === b.item && mergeMap[a.item] !== undefined) {
        const newItem = mergeMap[a.item];
        const newLevel = items[newItem].level;
        const chain = items[newItem].chain;

        if (newLevel > discoveredLevel[chain]) {
          setMsg("This recipe is not discovered yet. Use Research first.");
          playSound("error");
          return;
        }

        board[to] = makeItem(newItem, {
          lucky: a.lucky || b.lucky,
          chainBadge: isMaxItem(newItem) || a.chainBadge || b.chainBadge
        });

        board[from] = null;
        selectedIndex = to;
        mergedItemIndex = to;
        daily.merge.value++;
        updateAchievements();

        setMsg(isMaxItem(newItem) ? items[newItem].name + " completed! ⭐" : ((a.lucky || b.lucky) ? "Lucky merge! ✨" : "Nice merge!"));
        playSound("merge");
        return;
      }

      setMsg("Only same items merge.");

    function generateItem(type) {
      if (energy <= 0) {
        setMsg("No energy. Use Gift, Recycle, Boost or Shop.");
        playSound("error");
        return;
      }

      const empty = [];
      for (let i = 0; i < boardSize; i++) if (board[i] === null) empty.push(i);

      if (empty.length === 0) {
        setMsg("Board full. Merge or recycle.");
        playSound("error");
        return;
      }

      const wasFullEnergy = energy >= maxEnergy;
      energy--;
      if (energy < maxEnergy && (wasFullEnergy || !localStorage.getItem("mmc_lastEnergyTime"))) {
        localStorage.setItem("mmc_lastEnergyTime", String(Date.now()));
      }
      const slot = empty[Math.floor(Math.random() * empty.length)];
      const item = getMachineItem(type);
      let luckyChance = 0.08;

      const leyla = storyProfiles.find(p => p.id === "leyla");
      if (leyla.unlocked >= 3 && machineDefs[type].chain === "drink") luckyChance += 0.02;

      const lucky = Math.random() < luckyChance;
      board[slot] = makeItem(item, { lucky });
      newItemIndex = slot;
      setMsg(lucky ? "Lucky item! ✨" : "New item!");
      playSound("upgrade");
      updateAll();
    }

    function getMachineItem(type) {
      const chain = machineDefs[type].chain;
      const maxLevel = Math.min(machineLevels[type], discoveredLevel[chain], getChainLength(chain));

      if (maxLevel <= 1) return getChainIndexByLevel(chain, 1);

      const weights = [];
      for (let level = 1; level <= maxLevel; level++) {
        weights.push({ itemIndex: getChainIndexByLevel(chain, level), weight: Math.pow(0.55, level - 1) });
      }

      const total = weights.reduce((sum, x) => sum + x.weight, 0);
      let r = Math.random() * total;
      for (const x of weights) {
        r -= x.weight;
        if (r <= 0) return x.itemIndex;
      }

      return getChainIndexByLevel(chain, maxLevel);
    }

    function orderItemReady(itemIndex) {

    function orderEmojiText(orderArr) {

    function setupCustomers() {
      customers = [];
      refillCustomerDeck();
      for (let i = 0; i < customerSlots; i++) customers.push(newCustomer());
    }

    function shuffleArray(arr) {
      const copy = arr.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function refillCustomerDeck() {
      customerDeck = shuffleArray(storyProfiles.map(p => p.id));
    }

    function drawUniqueProfile() {
      const activeIds = customers.map(c => c.profile.id);
      if (customerDeck.length === 0) refillCustomerDeck();

      let safety = 0;
      while (safety < storyProfiles.length * 3) {
        if (customerDeck.length === 0) refillCustomerDeck();
        const id = customerDeck.shift();
        if (!activeIds.includes(id)) {
          return storyProfiles.find(p => p.id === id) || storyProfiles[0];
        }
        customerDeck.push(id);
        safety++;
      }

      return storyProfiles.find(p => !activeIds.includes(p.id)) || storyProfiles[Math.floor(Math.random() * storyProfiles.length)];
    }

    function newCustomer() {
      const profile = drawUniqueProfile();
      const orders = generateUniqueOrders(profile);
      return { profile, orders, givesPart: orderGivesPart() };
    }

    function shouldMakeMultiOrder() {
      if (fameRank < 1) return false;
      const ada = storyProfiles.find(p => p.id === "ada");
      let chance = fameRank >= 6 ? 0.55 : fameRank >= 4 ? 0.42 : fameRank >= 2 ? 0.28 : 0.16;
      if (ada && ada.unlocked >= 2) chance += 0.10;
      return Math.random() < chance;
    }

    function orderKey(orderArr) {
      return orderArr.slice().sort((a, b) => a - b).join("-");
    }

    function getActiveOrderKeys() {
      return customers.map(c => orderKey(c.orders));
    }

    function getActiveOrderChains() {
      const chains = [];
      customers.forEach(c => c.orders.forEach(itemIndex => chains.push(items[itemIndex].chain)));
      return chains;
    }

    function generateUniqueOrders(profile) {
      const activeKeys = getActiveOrderKeys();
      const orderCount = shouldMakeMultiOrder() ? 2 : 1;
      let fallback = [];

      for (let attempt = 0; attempt < 60; attempt++) {
        const orders = [];
        const usedChains = [];

        for (let i = 0; i < orderCount; i++) {
          const item = pickBalancedOrderItem(profile, usedChains, orders);
          if (item !== null && !orders.includes(item)) {
            orders.push(item);
            usedChains.push(items[item].chain);
          }
        }

        if (orders.length === 0) orders.push(availableOrders()[0]);
        fallback = orders;

        const key = orderKey(orders);
        if (!activeKeys.includes(key) && !recentOrderKeys.includes(key)) {
          rememberOrder(orders);
          return orders;
        }
      }

      rememberOrder(fallback);
      return fallback.length ? fallback : [availableOrders()[0]];
    }

    function rememberOrder(orders) {
      const key = orderKey(orders);
      recentOrderKeys.push(key);
      if (recentOrderKeys.length > 10) recentOrderKeys.shift();

      orders.forEach(itemIndex => {
        recentOrderChains.push(items[itemIndex].chain);
        if (recentOrderChains.length > 10) recentOrderChains.shift();
      });
    }

    function pickBalancedOrderItem(profile, usedChains = [], usedItems = []) {
      const groups = availableOrderGroups();
      const chains = Object.keys(groups).filter(chain => groups[chain].length > 0);
      if (chains.length === 0) return availableOrders()[0] || 1;

      const activeChains = getActiveOrderChains();
      const favoriteChain = favoriteToChain(profile.favorite);
      const weightedChains = [];

      chains.forEach(chain => {
        let weight = 12;

        if (activeChains.includes(chain)) weight -= 5;
        if (recentOrderChains.includes(chain)) weight -= 3;
        if (usedChains.includes(chain)) weight -= 7;
        if (favoriteChain === chain) weight += 1;

        const machineType = Object.keys(machineDefs).find(k => machineDefs[k].chain === chain);
        if (machineType && unlockedMachines[machineType]) weight += 2;

        weight = Math.max(1, weight);
        for (let i = 0; i < weight; i++) weightedChains.push(chain);
      });

      const selectedChain = weightedChains[Math.floor(Math.random() * weightedChains.length)] || chains[0];
      const pool = groups[selectedChain].filter(itemIndex => !usedItems.includes(itemIndex));
      const finalPool = pool.length ? pool : groups[selectedChain];

      const weightedItems = [];
      finalPool.forEach(itemIndex => {
        const lvl = items[itemIndex].level;
        const progress = Math.max(fameRank, Math.floor(totalServed / 8));
        let weight;

        if (progress < 3) {
          weight = lvl <= 2 ? 8 : lvl === 3 ? 5 : lvl === 4 ? 2 : 1;
        } else if (progress < 7) {
          weight = lvl <= 2 ? 5 : lvl === 3 ? 6 : lvl === 4 ? 5 : lvl === 5 ? 3 : 2;
        } else if (progress < 12) {
          weight = lvl <= 2 ? 2 : lvl === 3 ? 4 : lvl === 4 ? 6 : lvl === 5 ? 5 : 4;
        } else {
          weight = lvl <= 2 ? 1 : lvl === 3 ? 2 : lvl === 4 ? 5 : lvl === 5 ? 7 : 8;
        }

        if (lvl === getChainLength(items[itemIndex].chain) && progress >= 6) weight += 5;
        for (let i = 0; i < Math.max(1, weight); i++) weightedItems.push(itemIndex);
      });

      return weightedItems[Math.floor(Math.random() * weightedItems.length)] || finalPool[0];
    }

    function favoriteToChain(favorite) {
      if (!favorite) return null;
      const f = favorite.toLowerCase();
      if (f.includes("tea")) return "tea";
      if (f.includes("smoothie") || f.includes("juice")) return "juice";
      if (f.includes("cake") || f.includes("cupcake") || f.includes("dessert")) return "dessert";
      if (f.includes("coffee") || f.includes("latte") || f.includes("drink")) return "drink";
      if (f.includes("sandwich") || f.includes("bagel") || f.includes("bakery")) return "bakery";
      if (f.includes("ice") || f.includes("sundae")) return "ice";
      return null;
    }

    function availableOrderGroups() {
      const groups = {};

      Object.keys(chainStart).forEach(chain => {
        if (!isChainAvailable(chain)) return;
        const max = Math.min(discoveredLevel[chain], getChainLength(chain));
        groups[chain] = [];

        for (let lvl = 2; lvl <= max; lvl++) {
          groups[chain].push(getChainIndexByLevel(chain, lvl));
        }
      });

      return groups;
    }

    function availableOrders() {
      const groups = availableOrderGroups();
      const result = [];
      Object.keys(groups).forEach(chain => result.push(...groups[chain]));

      if (result.length === 0) return [1, 7];
      return result;
    }

    function isChainAvailable(chain) {
      const machineType = Object.keys(machineDefs).find(k => machineDefs[k].chain === chain);
      return machineType && unlockedMachines[machineType];
    }

    function orderGivesPart() {
      if (ordersSinceLastPart >= 4) return true;
      return Math.random() < 0.25;
    }

    function isCustomerReady(c) {
      const used = {};
      for (const itemIndex of c.orders) {
        const boardIndex = board.findIndex((x, idx) => x && x.item === itemIndex && !used[idx]);
        if (boardIndex === -1) return false;
        used[boardIndex] = true;
      }
      return true;
    }

    function hasOrderItem(itemIndex) {
      return customers.some(c => c.orders.includes(itemIndex));
    }

    function isOrderReady(itemIndex) {
      return hasOrderItem(itemIndex);
    }

    function getBaseReward(itemIndex) {
      const level = items[itemIndex].level;
      const base = { 1: 8, 2: 20, 3: 45, 4: 85, 5: 140, 6: 220, 7: 320, 8: 450, 9: 620 };
      return base[level] || Math.max(15, level * 70);
    }

    function getCustomerReward(c) {
      let reward = c.orders.reduce((sum, itemIndex) => sum + getBaseReward(itemIndex), 0);
      reward += fameRank * 5;

      const ada = storyProfiles.find(p => p.id === "ada");
      const bora = storyProfiles.find(p => p.id === "bora");
      const kerem = storyProfiles.find(p => p.id === "kerem");
      const luna = storyProfiles.find(p => p.id === "luna");
      const emre = storyProfiles.find(p => p.id === "emre");

      c.orders.forEach(itemIndex => {
        const item = items[itemIndex];
        if (kerem.unlocked >= 1 && item.name === "Coffee") reward += 5;
        if (luna.unlocked >= 1 && item.name === "Latte") reward += 5;
        if (emre.unlocked >= 1 && item.name === "Cupcake") reward += 5;
        if (bora.unlocked >= 1 && item.chain === "dessert") reward += 10;
      });

      if (c.orders.length > 1) reward += 35;
      if (ada.unlocked >= 3) reward += 5;
      return reward;
    }

    function getCustomerFameReward(c) {
      let fame = c.orders.reduce((sum, itemIndex) => sum + items[itemIndex].level * 4 + 4, 0);
      if (c.orders.length > 1) fame += 10;
      const ada = storyProfiles.find(p => p.id === "ada");
      if (ada.unlocked >= 1) fame = Math.ceil(fame * 1.1);
      return fame;
    }

    function serveCustomer(index) {
      const c = customers[index];
      if (!isCustomerReady(c)) {
        setMsg("Order items are not ready.");
        playSound("error");
        return;
      }

      let luckyBonus = 0;
      const used = {};

      c.orders.forEach(itemIndex => {
        const boardIndex = board.findIndex((x, idx) => x && x.item === itemIndex && !used[idx]);
        if (boardIndex !== -1) {
          const served = board[boardIndex];
          if (served.lucky) luckyBonus += 25;
          board[boardIndex] = null;
          used[boardIndex] = true;
        }
      });

      let reward = getCustomerReward(c) + luckyBonus;
      const fameGain = getCustomerFameReward(c) + (luckyBonus ? 6 : 0);

      coins += reward;
      famePoints += fameGain;
      c.profile.visits++;
      totalServed++;
      daily.serve.value++;
      achievements.serve20.value = totalServed;

      let partMsg = "";
      if (c.givesPart) {
        parts++;
        ordersSinceLastPart = 0;
        partMsg = " +1 🔧";
      } else {
        ordersSinceLastPart++;
      }

      const emre = storyProfiles.find(p => p.id === "emre");
      giftProgress++;
      if (emre.unlocked >= 3 && Math.random() < 0.3) giftProgress++;

      customers[index] = newCustomer();

      setMsg((luckyBonus ? "Lucky order! " : "Served! ") + "+" + reward + " 🪙 +" + fameGain + " ⭐" + partMsg);
      playSound("order");

      updateAll();
      checkFameRankUp();
      updateAchievements();

      if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
    }

    function openSheet(type, btn) {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
      const sheet = document.getElementById("sheet");
      sheet.dataset.type = type;
      refreshOpenSheet();
      sheet.classList.add("show");
    }

    function refreshOpenSheet() {
      const sheet = document.getElementById("sheet");
      const type = sheet.dataset.type || "goals";
      const title = document.getElementById("sheetTitle");
      const content = document.getElementById("sheetContent");

      if (type === "goals") { title.textContent = "🎯 Goals"; content.innerHTML = renderGoalsPanel(); }
      if (type === "fame") { title.textContent = "⭐ Cafe Fame"; content.innerHTML = renderFamePanel(); }
      if (type === "gift") { title.textContent = "🎁 Gift"; content.innerHTML = renderGiftPanel(); }
      if (type === "shop") { title.textContent = "🛒 Shop"; content.innerHTML = renderShopPanel(); }
      if (type === "info") { title.textContent = "ℹ️ Info"; content.innerHTML = renderInfoPanel(); }
      if (type === "minigame") { title.textContent = "🎮 Merge Drop"; content.innerHTML = renderMiniGamePanel(); }
    }

    function closeSheet() {
      document.getElementById("sheet").classList.remove("show");
    }

    function renderGoalsPanel() {
      return `
        <div class="panel-card">
          <h3>Daily Tasks</h3>
          <p>These give you a reason to keep playing beyond the merge board.</p>
        </div>
        ${renderTask("merge", daily.merge)}
        ${renderTask("serve", daily.serve)}
        ${renderTask("discover", daily.discover)}
        <div class="panel-card">
          <h3>Achievements</h3>
          <p>Long-term goals for progression.</p>
        </div>
        ${renderAchievement("serve20", achievements.serve20)}
        ${renderAchievement("rank3", achievements.rank3)}
        ${renderAchievement("unlock3", achievements.unlock3)}
        ${renderAchievement("recipes6", achievements.recipes6)}
      `;
    }

    function renderTask(key, task) {
      const pct = Math.min(100, Math.round((task.value / task.target) * 100));
      const done = task.value >= task.target;
      return `
        <div class="task-card">
          <h3>${done ? "✅" : "▫️"} ${task.title}</h3>
          <p>${Math.min(task.value, task.target)} / ${task.target} · Reward: ${task.reward}</p>
          <div class="task-progress"><div class="task-fill" style="width:${pct}%"></div></div>
          <button class="green-btn" onclick="claimDaily('${key}')" ${done && !task.claimed ? "" : "disabled"}>${task.claimed ? "Claimed" : "Claim Reward"}</button>
        </div>`;
    }

    function renderAchievement(key, ach) {
      const pct = Math.min(100, Math.round((ach.value / ach.target) * 100));
      const done = ach.value >= ach.target;
      return `
        <div class="task-card">
          <h3>${done ? "🏆" : "🔒"} ${ach.title}</h3>
          <p>${Math.min(ach.value, ach.target)} / ${ach.target} · Reward: ${ach.reward}</p>
          <div class="task-progress"><div class="task-fill" style="width:${pct}%"></div></div>
          <button class="orange-btn" onclick="claimAchievement('${key}')" ${done && !ach.claimed ? "" : "disabled"}>${ach.claimed ? "Claimed" : "Claim Reward"}</button>
        </div>`;
    }

    function claimDaily(key) {
      const task = daily[key];
      if (!task || task.claimed || task.value < task.target) return;
      task.claimed = true;

      const emre = storyProfiles.find(p => p.id === "emre");

      if (key === "merge") coins += 35;
      if (key === "serve") gems += emre.unlocked >= 2 ? 4 : 3;
      if (key === "discover") parts += 1;
      if (key === "mini") famePoints += 15;

      setMsg("Daily reward claimed!");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function claimAchievement(key) {
      const ach = achievements[key];
      if (!ach || ach.claimed || ach.value < ach.target) return;
      ach.claimed = true;

      if (key === "serve20") gems += 10;
      if (key === "rank3") parts += 3;
      if (key === "unlock3") gems += 15;
      if (key === "recipes6") coins += 150;

      setMsg("Achievement reward claimed!");
      playSound("upgrade");
      updateAll();
      refreshOpenSheet();
    }

    function updateAchievements() {
      achievements.rank3.value = fameRank >= 2 ? 1 : 0;
      achievements.unlock3.value = Object.values(unlockedMachines).filter(Boolean).length;
      achievements.recipes6.value = Object.values(discoveredLevel).reduce((a, b) => a + b, 0);
    }

    function renderFamePanel() {
      const next = fameRanks[fameRank + 1];
      const currentNeed = fameRanks[fameRank].need;
      const nextNeed = next ? next.need : fameRanks[fameRank].need;
      const pct = next ? Math.min(100, Math.round((famePoints - currentNeed) / (nextNeed - currentNeed) * 100)) : 100;

      let html = `
        <div class="fame-hero">
          <div class="fame-rank-title">⭐ ${fameRanks[fameRank].name}</div>
          <div class="fame-rank-sub">Fame: ${famePoints}${next ? " / " + next.need : " MAX"}</div>
          <div class="fame-bar"><div class="fame-fill" style="width:${pct}%"></div></div>
        </div>

        <div class="unlock-card">
          <h3>🏆 Fame Road</h3>
          <p>See what your cafe will unlock next.</p>
          ${renderFameRoad()}
        </div>

        <div class="unlock-card">
          <h3>Research Lab</h3>
          <p>Research now discovers real recipes. New recipes can appear in orders and be merged on the board.</p>
          ${renderResearchButton("drink")}
          ${renderResearchButton("dessert")}
          ${unlockedMachines.bakery ? renderResearchButton("bakery") : ""}
          ${unlockedMachines.tea ? renderResearchButton("tea") : ""}
          ${unlockedMachines.juice ? renderResearchButton("juice") : ""}
          ${unlockedMachines.ice ? renderResearchButton("ice") : ""}
        </div>

        <div class="unlock-card">
          <h3>Spend Coins</h3>
          <p>Coins unlock useful progress, not just numbers.</p>
          ${renderCustomerSlotButton()}
        </div>

        <div class="panel-card">
          <h3>Customer Stories</h3>
          <p>Stories now give permanent bonuses. Unlocking them improves rewards, fame, gift progress or production chances.</p>
        </div>
      `;

      storyProfiles.forEach(p => {
        const nextStory = p.unlocked < p.stories.length ? p.stories[p.unlocked] : null;
        const canUnlock = nextStory && p.visits >= p.unlocked + 1;
        const cost = p.costs[p.unlocked] || 0;

        html += `
          <div class="story-card">
            <div class="story-top">
              <div class="story-avatar">
                <img src="${p.portrait}" alt="${p.name}">
              </div>
              <div class="story-body">
                <div class="story-title">${p.name}</div>
                <div class="story-meta">${p.trait} · Favorite: ${p.favorite} · Visits: ${p.visits} · Story: ${p.unlocked}/3</div>
              </div>
              ${nextStory ? `<button class="small-action-btn" onclick="unlockStory('${p.id}')" ${canUnlock ? "" : "disabled"}>${cost} 🪙</button>` : `<span class="done-badge2">Done ✓</span>`}
            </div>
            ${p.unlocked > 0 ? `<div class="story-text">${p.stories[p.unlocked - 1]}</div>` : `<div class="story-text">Serve this customer to reveal their story.</div>`}
            <div class="info-note"><b>Next Bonus:</b> ${p.unlocked < p.bonusNames.length ? p.bonusNames[p.unlocked] : "All bonuses unlocked."}</div>
            ${nextStory && !canUnlock ? `<p style="font-size:12px;font-weight:900;color:#8b5e34;margin-top:7px;">Need ${p.unlocked + 1} visit(s) to unlock next story.</p>` : ""}
          </div>`;
      });

      return html;
    }


    function renderFameRoad() {
      return `<div class="fame-road">${fameRanks.map((r, idx) => {
        const done = idx <= fameRank;
        const current = idx === fameRank;
        const icon = done ? "⭐" : "🔒";
        return `
          <div class="fame-node ${done ? "done" : ""} ${current ? "current" : ""}">
            <div class="fame-node-icon">${icon}</div>
            <div class="fame-node-name">${idx + 1}. ${r.name}</div>
            <div class="fame-node-need">${idx === 0 ? "Start" : r.need + " ⭐"}</div>
            <div class="fame-node-reward">${rankUnlockText(idx)}</div>
          </div>`;
      }).join("")}</div>`;
    }

    function rankUnlockText(rank) {
      const map = {
        1: "+10 ⚡ +1 🔧 +5 💎",
        2: "Combo orders",
        3: "Bakery offer",
        4: "Tea/Juice offers",
        5: "+10 Max ⚡",
        7: "Ice Cream offer",
        9: "5th customer spot",
        10: "Faster energy regen",
        12: "Better combo rewards",
        15: "+20 Max ⚡",
        18: "Top-tier orders",
        19: "Master status"
      };
      return map[rank] || fameRanks[rank].reward;
    }

    function rankRewardHTML(rank) {
      const rewards = [];
      if (rank === 1) rewards.push("⚡ +10 Energy", "🔧 +1 Part", "💎 +5 Gems");
      if (rank === 2) rewards.push("🍽️ Combo Orders", "⚡ +15 Energy", "🔧 +2 Parts");
      if (rank === 3) rewards.push("🥐 Bakery Offer", "⚡ +20 Energy", "💎 +10 Gems");
      if (rank === 4) rewards.push("🍵 Tea Orders", "🧃 Juice Offer", "💎 +20 Gems");
      if (rank === 5) rewards.push("⚡ Max Energy +10", "🎁 Better Gift Value");
      if (rank === 7) rewards.push("🍦 Ice Cream Offer", "🔧 +2 Parts");
      if (rank === 9) rewards.push("👥 Final Customer Spot", "⚡ +20 Energy");
      if (rank === 10) rewards.push("⏱️ Faster Energy Regen", "🔧 +3 Parts");
      if (rank === 12) rewards.push("🍽️ Better Combo Rewards", "💎 +20 Gems");
      if (rank === 15) rewards.push("⚡ Max Energy +20", "✨ Lucky Rewards Improve");
      if (rank === 18) rewards.push("🌟 Top-tier Orders", "⚡ +40 Energy");
      if (rank === 19) rewards.push("🏆 Mini Merge Master", "👑 Max Rank");
      if (!rewards.length) rewards.push(fameRanks[rank].reward);
      return `<div class="rank-reward-icons">${rewards.map(r => `<div class="rank-reward-chip">${r}</div>`).join("")}</div>`;
    }

    function renderResearchButton(chain) {
      const label = chainLabel(chain);
      const level = discoveredLevel[chain];

      if (level >= getChainLength(chain)) {
        return `<button class="green-btn" disabled>${label} Research Complete ✓</button>`;
      }

      const nextIndex = getChainIndexByLevel(chain, level + 1);
      const nextItem = items[nextIndex];
      return `<button class="blue-btn" onclick="doResearch('${chain}'); refreshOpenSheet();">${label} Research - ${researchCost[chain]} 🪙<br>Discover: ${itemImageHTML(nextIndex, "order-icon-img")} ${nextItem.name}</button>`;
    }

    function chainLabel(chain) {
      if (chain === "drink") return "Drink";
      if (chain === "dessert") return "Dessert";
      if (chain === "bakery") return "Bakery";
      if (chain === "tea") return "Tea";
      if (chain === "juice") return "Juice";
      if (chain === "ice") return "Ice Cream";
      return chain;
    }

    function doResearch(chain) {
      if (discoveredLevel[chain] >= getChainLength(chain)) {
        setMsg("All recipes already discovered.");
        return;
      }

      const cost = researchCost[chain];
      if (coins < cost) {
        setMsg("Need " + cost + " coins for research.");
        playSound("error");
        return;
      }

      coins -= cost;
      const oldLevel = discoveredLevel[chain];
      discoveredLevel[chain]++;
      researchCost[chain] += 80;

      const itemIndex = getChainIndexByLevel(chain, oldLevel + 1);
      const item = items[itemIndex];

      daily.discover.value++;
      updateAchievements();
      famePoints += 8;

      showGameModal("🔬", "New Recipe Discovered!", itemImageHTML(itemIndex, "info-item-img") + "<br>" + item.name, "Unlocked for merge, machine production and customer orders. Reward: +8 ⭐");
      setMsg(item.name + " discovered!");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
    }

    function nextCustomerSlotRequirement() {
      if (customerSlots >= MAX_CUSTOMER_SLOTS) {
        return { cost: 0, rank: 0, label: "All customer spots unlocked" };
      }

      if (customerSlots === 3) {
        return { cost: 180, rank: 3, label: "Unlock 4th Customer Spot" };
      }

      if (customerSlots === 4) {
        return { cost: 500, rank: 9, label: "Unlock 5th Customer Spot" };
      }

      if (customerSlots === 5) {
        return { cost: 900, rank: 14, label: "Unlock 6th Customer Spot" };
      }

      return { cost: 0, rank: 0, label: "All customer spots unlocked" };
    }

    function renderCustomerSlotButton() {
      const req = nextCustomerSlotRequirement();

      if (customerSlots >= MAX_CUSTOMER_SLOTS) {
        return `<button class="green-btn" disabled>Customer Spots: ${customerSlots}/${MAX_CUSTOMER_SLOTS} ✓</button>`;
      }

      const rankOk = fameRank >= req.rank;
      const coinOk = coins >= req.cost;
      const disabled = rankOk && coinOk ? "" : "disabled";
      const needText = rankOk ? `${req.cost} 🪙` : `Requires ${fameRanks[req.rank].name}`;

      return `<button class="orange-btn" onclick="unlockExtraCustomerSlot()" ${disabled}>${req.label} (${customerSlots}/${MAX_CUSTOMER_SLOTS}) - ${needText}</button>`;
    }

    function unlockExtraCustomerSlot() {
      if (customerSlots >= MAX_CUSTOMER_SLOTS) {
        setMsg("All customer spots are already unlocked.");
        return;
      }

      const req = nextCustomerSlotRequirement();

      if (fameRank < req.rank) {
        setMsg("Reach " + fameRanks[req.rank].name + " first.");
        playSound("error");
        return;
      }

      if (coins < req.cost) {
        setMsg("Need " + req.cost + " coins.");
        playSound("error");
        return;
      }

      coins -= req.cost;
      customerSlots++;
      customers.push(newCustomer());
      famePoints += 25;

      showGameModal("👥", "New Customer Spot!", customerSlots + "/" + MAX_CUSTOMER_SLOTS + " spots unlocked", "More customers can wait at the same time. Reward: +25 ⭐");
      setMsg("New customer spot unlocked!");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function unlockStory(id) {
      const p = storyProfiles.find(x => x.id === id);
      if (!p || p.unlocked >= p.stories.length) return;

      if (p.visits < p.unlocked + 1) {
        setMsg("Serve this customer more to unlock the story.");
        return;
      }

      const cost = p.costs[p.unlocked];
      if (coins < cost) {
        setMsg("Need " + cost + " coins.");
        playSound("error");
        return;
      }

      coins -= cost;
      p.unlocked++;

      const fameGain = 20 + p.unlocked * 10;
      famePoints += fameGain;

      if (p.unlocked === 3) parts += 1;

      showGameModal("📖", "Story Bonus Unlocked!", p.name, p.bonusNames[p.unlocked - 1] + "<br>Reward: +" + fameGain + " ⭐" + (p.unlocked === 3 ? " +1 🔧" : ""));
      setMsg("Story unlocked: " + p.name + "! +" + fameGain + " ⭐");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function renderGiftPanel() {
      return `
        <div class="panel-card">
          <h3>Gift Box</h3>
          <p>${giftReady ? "Gift ready! Claim +8 energy." : "Serve " + Math.min(giftProgress, giftTarget) + "/" + giftTarget + " customers to unlock."}</p>
          <div class="task-progress"><div class="task-fill" style="width:${Math.min(100, Math.round((giftProgress / giftTarget) * 100))}%"></div></div>
          <button class="green-btn" onclick="claimGift(); refreshOpenSheet();" ${giftReady ? "" : "disabled"}>${giftReady ? "Claim +8 ⚡" : "Locked"}</button>
        </div>


        <div class="panel-card">
          <h3>Energy Boost</h3>
          <p>Watch a short ad break to get +15 energy.</p>
          <button class="blue-btn" onclick="watchAd(); refreshOpenSheet();" ${adCooldown ? "disabled" : ""}>${adCooldown ? "Available in " + adCooldownSeconds + "s" : "Watch Ad +15 ⚡"}</button>
        </div>

        <div class="panel-card">
          <h3>🎮 Merge Drop</h3>
          <p>Drop cafe items, complete rows and reach 2000 points before time ends.</p>
          <p><b>Daily plays:</b> ${MERGE_DROP_MAX_DAILY - mergeDrop.playsToday}/${MERGE_DROP_MAX_DAILY}</p>
          <button class="purple-btn" onclick="openSheet('minigame')">Open Merge Drop</button>
        </div>`;

    function formatSeconds(sec) {
      sec = Math.max(0, Number(sec) || 0);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m + ":" + String(s).padStart(2, "0");
    }



    function updateEnergyHomeTimer() {
      const el = document.getElementById("energyHomeTimer");
      if (!el) return;
      if (energy >= maxEnergy) {
        el.textContent = "Energy Full";
      } else {
        el.textContent = "Next +1 ⚡ " + formatSeconds(nextEnergySeconds || Math.ceil(getEnergyRegenMs() / 1000));
      }
    }

    function renderShopPanel() {
      return `
        <div class="panel-card">
          <h3>💎 Gem Shop</h3>
          <p>Gems are a future premium currency. Later these can connect to App Store / Google Play purchases.</p>
          <p><b>Your gems:</b> 💎 ${gems}</p>
          <button class="green-btn" onclick="buyEnergyWithGems(10, 6); refreshOpenSheet();">Buy +10 Energy - 6 💎</button>
          <button class="blue-btn" onclick="buyEnergyWithGems(25, 14); refreshOpenSheet();">Buy +25 Energy - 14 💎</button>
          <button class="orange-btn" onclick="prototypeBuyGems(); refreshOpenSheet();">Prototype Gem Pack +25 💎</button>
          <div class="info-note">Prototype Gem Pack is free for testing now. Later it can become a real payment product.</div>
