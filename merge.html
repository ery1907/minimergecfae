<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mini Merge Cafe</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Trebuchet MS", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #fff8d9 0, transparent 34%),
        radial-gradient(circle at bottom right, #ffd2dc 0, transparent 36%),
        linear-gradient(180deg, #fff3e8, #ffdcbf);
      color: #5a3825;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    button {
      font-weight: 900;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 12px 12px 94px;
      background:
        linear-gradient(rgba(255, 243, 232, 0.88), rgba(255, 243, 232, 0.94)),
        radial-gradient(circle at 8% 16%, rgba(76, 175, 122, 0.14), transparent 24%),
        radial-gradient(circle at 92% 50%, rgba(255, 159, 67, 0.16), transparent 24%);
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      background: rgba(255,255,255,0.85);
      border: 2px solid #f4cf9c;
      border-radius: 26px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.12);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff3e8;
      border: 3px solid #d69456;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      box-shadow: inset 0 2px 8px rgba(90,56,37,0.12);
    }

    h1 {
      margin: 0;
      flex: 1;
      text-align: center;
      font-size: 25px;
      color: #653719;
      letter-spacing: 1px;
    }

    .gear {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff8ef;
      border: 2px solid #f1c27d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      box-shadow: 0 4px 10px rgba(90,56,37,0.12);
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat-pill {
      background: #fff8ef;
      border: 2px solid #f1c27d;
      border-radius: 18px;
      padding: 8px 5px;
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(90,56,37,0.06);
      white-space: nowrap;
    }

    .orders-section {
      background: rgba(255,255,255,0.88);
      border: 2px solid #f4cf9c;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.1);
      margin-bottom: 13px;
    }

    .section-ribbon {
      width: fit-content;
      margin: -25px auto 10px;
      background: linear-gradient(180deg, #ff8fa8, #ef5d7a);
      color: white;
      padding: 8px 28px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 5px 12px rgba(90,56,37,0.18);
      border: 2px solid rgba(255,255,255,0.55);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .customers {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px 6px;
      scroll-snap-type: x mandatory;
    }

    .customers::-webkit-scrollbar {
      display: none;
    }

    .customer-card {
      min-width: 206px;
      background: linear-gradient(180deg, #fff9f2, #fff0df);
      border: 2px solid #f1c27d;
      border-radius: 22px;
      padding: 10px;
      box-shadow: 0 6px 14px rgba(90,56,37,0.11);
      scroll-snap-align: start;
      position: relative;
      transition: 0.2s;
      overflow: hidden;
    }

    .customer-card.ready {
      border-color: #34c759;
      box-shadow: 0 0 0 3px rgba(52,199,89,0.18), 0 0 18px rgba(52,199,89,0.28), 0 6px 14px rgba(90,56,37,0.12);
      animation: readyPulse 1.1s infinite ease-in-out;
    }

    @keyframes readyPulse {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-2px) scale(1.02); }
    }

    .ready-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #4caf7a;
      color: white;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      z-index: 4;
    }

    .customer-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .portrait-ring {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(180deg, #ffddb5, #f1b56f);
      box-shadow: 0 4px 10px rgba(90,56,37,0.15);
      flex-shrink: 0;
    }

    .portrait-ring img {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      object-fit: cover;
      display: block;
      background: #fff7ee;
    }

    .customer-meta {
      min-width: 0;
      flex: 1;
    }

    .customer-name {
      font-size: 15px;
      font-weight: 900;
      color: #653719;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .customer-trait {
      font-size: 11px;
      font-weight: 800;
      color: #9c6a3f;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .customer-mood {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff6e7;
      border: 1px solid #f1d3a5;
      color: #8b5e34;
      font-size: 10px;
      font-weight: 900;
    }

    .order-block {
      background: rgba(255,255,255,0.85);
      border: 2px solid #f2d1a5;
      border-radius: 16px;
      padding: 9px;
      margin-bottom: 8px;
    }

    .order-label {
      font-size: 10px;
      color: #9e6b42;
      font-weight: 900;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .order-emoji {
      font-size: 25px;
      min-height: 30px;
      margin-bottom: 3px;
    }

    .order-name {
      font-weight: 900;
      font-size: 13px;
      line-height: 1.2;
      color: #653719;
    }

    .reward {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-weight: 900;
      font-size: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .reward span {
      background: #fff8ef;
      border: 1px solid #f1d3a5;
      border-radius: 999px;
      padding: 4px 7px;
    }

    .serve-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
      box-shadow: 0 4px 0 #2c761d;
      color: white;
      padding: 8px 10px;
      border-radius: 13px;
      font-size: 14px;
      width: 100%;
    }

    .serve-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2c761d;
    }

    .board-frame {
      background: linear-gradient(180deg, #bc7337, #8c4d27);
      border-radius: 28px;
      padding: 12px;
      border: 4px solid #6f391b;
      box-shadow:
        inset 0 4px 8px rgba(255,255,255,0.25),
        inset 0 -8px 12px rgba(0,0,0,0.18),
        0 10px 22px rgba(90,56,37,0.25);
      margin-bottom: 12px;
    }

    .board-label {
      width: fit-content;
      margin: -2px auto 10px;
      background: linear-gradient(180deg, #9a552b, #713717);
      color: white;
      padding: 8px 38px;
      border-radius: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.18);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      background: rgba(90,56,37,0.13);
      border-radius: 20px;
      padding: 8px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, #fff1d9, #f7d5aa);
      border: 2px solid #e4af74;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 30px;
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.6),
        inset 0 -3px 6px rgba(90,56,37,0.09);
      cursor: pointer;
      transition: 0.16s;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell.selected {
      outline: 4px solid #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.75);
    }

    .cell.drag-over {
      outline: 4px solid #4caf7a;
    }

    .machine {
      color: white;
      border: 3px solid #5a3825;
      box-shadow: 0 5px 12px rgba(90,56,37,0.25);
    }

    .drink-machine { background: linear-gradient(180deg, #79c7e8, #2e8ebb); }
    .dessert-machine { background: linear-gradient(180deg, #ffb6c8, #e6789a); }
    .bakery-machine { background: linear-gradient(180deg, #e9b872, #b76b26); }
    .tea-machine { background: linear-gradient(180deg, #9be37d, #3f9b45); }
    .juice-machine { background: linear-gradient(180deg, #ffb24a, #ef6f2e); }
    .ice-machine { background: linear-gradient(180deg, #b7e6ff, #5aa9d6); }

    .machine-label,
    .item-name {
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 6.4px;
      font-weight: 900;
      color: #5a3825;
      pointer-events: none;
    }

    .machine-label {
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }

    .item {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      touch-action: none;
      animation: itemFloat 2s infinite ease-in-out;
    }

    @keyframes itemFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .pop { animation: pop 0.35s ease-out; }

    @keyframes pop {
      0% { transform: scale(0.2) rotate(-12deg); opacity: 0; }
      65% { transform: scale(1.18) rotate(5deg); opacity: 1; }
      100% { transform: scale(1); }
    }

    .lucky-cell {
      border-color: #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.8);
      background: linear-gradient(180deg, #fff5bd, #ffd36e);
    }

    .mini-badge {
      position: absolute;
      top: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border: 2px solid white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      z-index: 3;
    }

    .badge-lucky { left: -8px; background: #ffb703; }
    .badge-star { left: 16px; background: #8338ec; }
    .badge-ready { right: -8px; background: #4caf7a; }

    .hint-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #f4cf9c;
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 6px 14px rgba(90,56,37,0.12);
    }

    .helper { font-size: 34px; }
    .message { flex: 1; font-weight: 900; font-size: 14px; line-height: 1.35; }
    .bulb { font-size: 27px; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: min(456px, calc(100% - 18px));
      background: rgba(255,248,239,0.96);
      border: 2px solid #f1c27d;
      border-radius: 26px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 7px;
      box-shadow: 0 -8px 24px rgba(90,56,37,0.18);
      z-index: 50;
    }

    .nav-btn {
      background: transparent;
      color: #5a3825;
      border: none;
      box-shadow: none;
      padding: 7px 4px;
      border-radius: 18px;
      font-size: 24px;
      font-weight: 900;
    }

    .nav-btn.active {
      background: linear-gradient(180deg, #ffb6c8, #ff8fa8);
      color: #7b2b42;
    }

    .nav-btn span {
      display: block;
      font-size: 11px;
      margin-top: 2px;
    }

    .sheet {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -100%;
      width: min(456px, 100%);
      max-height: 76vh;
      background: #fff8ef;
      border-radius: 28px 28px 0 0;
      border: 3px solid #f1c27d;
      box-shadow: 0 -14px 35px rgba(90,56,37,0.28);
      padding: 16px;
      z-index: 80;
      overflow-y: auto;
      transition: bottom 0.28s ease;
    }

    .sheet.show { bottom: 0; }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 13px;
    }

    .sheet-header h2 {
      margin: 0;
      font-size: 22px;
      color: #653719;
    }

    .close-btn {
      width: auto;
      background: #ff8fa8;
      border: 2px solid #d95776;
      padding: 8px 13px;
      border-radius: 14px;
      color: white;
      font-weight: 900;
    }

    .panel-card,
    .story-card,
    .unlock-card,
    .order-row,
    .task-card {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 20px;
      padding: 13px;
      margin-bottom: 11px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
    }

    .panel-card h3,
    .task-card h3 {
      margin: 0 0 8px;
      color: #653719;
      font-size: 18px;
    }

    .panel-card p,
    .task-card p {
      margin: 5px 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .green-btn,
    .orange-btn,
    .blue-btn,
    .purple-btn {
      color: white;
      border-radius: 14px;
      padding: 10px;
      width: 100%;
      margin-top: 7px;
      font-weight: 900;
    }

    .green-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
    }

    .orange-btn {
      background: linear-gradient(180deg, #ffb24a, #ff8c1a);
      border: 2px solid #d96e00;
    }

    .blue-btn {
      background: linear-gradient(180deg, #79c7e8, #2e8ebb);
      border: 2px solid #1c6f97;
    }

    .purple-btn {
      background: linear-gradient(180deg, #b28dff, #7c4dff);
      border: 2px solid #5c35c9;
    }

    .task-progress {
      height: 12px;
      background: #f3cfa1;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #d69456;
      margin-top: 8px;
    }

    .task-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf7a, #a9e34b);
      border-radius: 999px;
    }

    .story-top,
    .order-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .story-avatar,
    .order-avatar {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      padding: 3px;
      background: linear-gradient(180deg, #ffe0b8, #efb06f);
      flex-shrink: 0;
    }

    .story-avatar img,
    .order-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 13px;
      object-fit: cover;
      display: block;
      background: #fff7ee;
    }

    .story-body,
    .order-body {
      flex: 1;
      min-width: 0;
    }

    .story-title,
    .order-title {
      font-size: 15px;
      font-weight: 900;
      color: #653719;
    }

    .story-meta,
    .order-meta {
      font-size: 12px;
      font-weight: 900;
      color: #8b5e34;
      margin-top: 2px;
      line-height: 1.25;
    }

    .story-text,
    .info-note {
      margin-top: 8px;
      padding: 9px;
      border-radius: 14px;
      background: #fff7e8;
      color: #5a3825;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 800;
    }

    .small-action-btn {
      background: linear-gradient(180deg, #ffb24a, #ff8c1a);
      border: 2px solid #d96e00;
      color: white;
      border-radius: 13px;
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 900;
      min-width: 88px;
    }

    .ready-serve-mini {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
      color: white;
      border-radius: 13px;
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 900;
      min-width: 78px;
    }

    .fame-hero {
      background: linear-gradient(180deg, #fff7e8, #ffe0b3);
      border: 2px solid #f1c27d;
      border-radius: 22px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
      text-align: center;
    }

    .fame-rank-title {
      font-size: 22px;
      font-weight: 900;
      color: #653719;
      margin-bottom: 4px;
    }

    .fame-rank-sub {
      font-size: 13px;
      font-weight: 900;
      color: #8b5e34;
      margin-bottom: 10px;
    }

    .fame-bar {
      height: 14px;
      background: #f3cfa1;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #d69456;
    }

    .fame-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffb703, #ff8c1a);
      border-radius: 999px;
      transition: width 0.45s ease;
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: rgba(255, 248, 239, 0.96);
      border: 3px solid #f1c27d;
      box-shadow: 0 16px 28px rgba(90,56,37,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(420px, 100%);
      background: #fff8ef;
      border: 4px solid #ffb703;
      border-radius: 30px;
      padding: 22px 16px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      animation: rankPop 0.4s ease-out;
      position: relative;
      overflow: hidden;
    }

    @keyframes rankPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .rank-big { font-size: 58px; margin-bottom: 8px; }
    .rank-title { font-size: 27px; font-weight: 900; color: #653719; margin-bottom: 6px; }
    .rank-name { font-size: 20px; font-weight: 900; color: #ff8c1a; margin-bottom: 10px; }
    .rank-reward {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 18px;
      padding: 10px;
      margin: 10px 0;
      color: #5a3825;
      font-weight: 900;
      line-height: 1.4;
    }

    .confetti {
      position: absolute;
      font-size: 22px;
      animation: confettiFall 1.2s ease-in forwards;
      pointer-events: none;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(260px) rotate(220deg); opacity: 0; }
    }

    .mini-game-area {
      height: 240px;
      background: linear-gradient(180deg, #fff7e8, #ffe1bf);
      border: 3px solid #f1c27d;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }

    .stain-dot {
      position: absolute;
      width: 56px;
      height: 46px;
      border-radius: 18px;
      background: rgba(255,255,255,0.85);
      border: 3px solid #ffb703;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      box-shadow: 0 0 14px rgba(255,183,3,0.5);
    }

    .rush-sequence {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 30px;
    }

    .rush-btn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .rush-btn {
      background: #fff3e8;
      border: 2px solid #f1c27d;
      border-radius: 17px;

    const chainStart = {
      dessert: 0,

    const machineDefs = {

      dessert: { name: "Dessert Machine", short: "Dessert", emoji: "🍪", cls: "dessert-machine", chain: "dessert", unlockRank: 0, cost: 0 },
      bakery: { name: "Bakery Oven", short: "Bakery", emoji: "🥐", cls: "bakery-machine", chain: "bakery", unlockRank: 1, cost: 45 },
      tea: { name: "Tea Machine", short: "Tea", emoji: "🌿", cls: "tea-machine", chain: "tea", unlockRank: 2, cost: 65 },
      juice: { name: "Juice Blender", short: "Juice", emoji: "🍓", cls: "juice-machine", chain: "juice", unlockRank: 2, cost: 75 },
      ice: { name: "Ice Cream Machine", short: "Ice", emoji: "🍦", cls: "ice-machine", chain: "ice", unlockRank: 3, cost: 95 }
    };

    const fameRanks = [
      { name: "Unknown Cafe", need: 0, reward: "Customer stories unlocked." },
      { name: "Local Favorite", need: 45, reward: "+1 Customer Slot, Bakery Oven offer, +10 Energy, +1 Part, +5 Gems." },
      { name: "Trendy Spot", need: 120, reward: "Drink/Dessert discoveries improved, Tea and Juice machines unlocked, +15 Energy, +2 Parts." },
      { name: "Famous Cafe", need: 240, reward: "Multi-order customers unlocked, Ice Cream machine unlocked, +20 Energy, +10 Gems." },
      { name: "City Icon", need: 430, reward: "Rare combo orders, stronger story bonuses, +25 Energy, +20 Gems." }
    ];

    const storyProfiles = [
      {
        id: "luna",
        name: "Luna",
        portrait: "assets/renovation/luna.png",
        trait: "Loves sweet drinks",
        mood: "Sweet Tooth",
        favorite: "Latte",
        visits: 0,
        unlocked: 0,
        costs: [80, 160, 260],
        bonusNames: ["Latte orders +5 coins", "Dessert combo chance improves", "Sweet drink customers appear more often"],
        stories: [

          "Luna becomes one of your star regulars and sweet combo orders increase."
        ]
      },
      {
        id: "kerem",
        name: "Kerem",
        portrait: "assets/renovation/kerem.png",
        trait: "Office break regular",
        mood: "In a Hurry",
        favorite: "Coffee",
        visits: 0,
        unlocked: 0,
        costs: [70, 150, 240],
        bonusNames: ["Coffee orders +5 coins", "Fast orders give +2 extra fame", "Single drink orders appear more often"],
        stories: [
          "Kerem stops by every lunch break because your coffee wakes him up.",
          "He starts recommending your cafe to coworkers in the nearby offices.",
          "Now the office crowd knows your cafe as the best quick coffee stop."
        ]
      },
      {
        id: "leyla",
        name: "Grandma Leyla",
        portrait: "assets/renovation/leyla.png",
        trait: "Warm coffee mornings",
        mood: "Relaxed",
        favorite: "Coffee",
        visits: 0,
        unlocked: 0,
        costs: [90, 170, 270],
        bonusNames: ["Coffee orders +5 coins", "Gift progress sometimes +1 extra", "Drink machine lucky chance +2%"],
        stories: [
          "Leyla says this cafe reminds her of Sunday mornings with her husband.",
          "She starts bringing old neighborhood stories and stays for longer chats.",
          "Leyla becomes the soul of the cafe and warm drink rewards improve."
        ]
      },
      {
        id: "bora",
        name: "Chef Bora",
        portrait: "assets/renovation/bora.png",
        trait: "Checks every dessert carefully",
        mood: "Expert Taste",
        favorite: "Cake",
        visits: 0,
        unlocked: 0,
        costs: [130, 230, 340],
        bonusNames: ["Dessert orders +10 coins", "Cake orders unlock earlier", "Dessert machine high-level chance improves"],
        stories: [
          "Bora tastes your desserts and says the cafe has serious potential.",
          "He gives a few baking tips and your cakes start standing out more.",
          "Bora becomes a silent mentor and dessert rewards improve noticeably."
        ]
      },
      {
        id: "ada",
        name: "Ada",
        portrait: "assets/renovation/ada.png",
        trait: "Loves stylish drinks",
        mood: "Trendy",
        favorite: "Fancy Drink",
        visits: 0,
        unlocked: 0,
        costs: [120, 220, 340],
        bonusNames: ["All fame rewards +10%", "Multi-order chance +10%", "Rare customer chance improves"],
        stories: [
          "Ada posts her first cafe photo and calls it a hidden gem.",
          "Her followers start visiting just to try your prettiest drinks.",
          "A viral post turns your cafe into a trendy spot for stylish orders."
        ]
      },
      {
        id: "emre",
        name: "Emre",
        portrait: "assets/renovation/emre.png",
        trait: "Student on a budget",
        mood: "Friendly",
        favorite: "Cupcake",
        visits: 0,
        unlocked: 0,
        costs: [75, 155, 250],
        bonusNames: ["Cupcake orders +5 coins", "Daily task rewards +1 gem", "Gift box fills faster"],
        stories: [
          "Emre studies here because the atmosphere helps him focus.",
          "He brings friends during exam weeks and fills the cafe with energy.",
          "Now your place is known among students as their favorite study cafe."
        ]
      }
    ];

    const mergeMap = {};
    Object.keys(chainStart).forEach(chain => {
      const s = chainStart[chain];
      mergeMap[s] = s + 1;
      mergeMap[s + 1] = s + 2;
      mergeMap[s + 2] = s + 3;
    });

    const boardSize = 30;
    let board = Array(boardSize).fill(null);
    board[5] = { machine: "drink" };
    board[24] = { machine: "dessert" };

    let coins = 0;
    let gems = 25;
    let parts = 0;
    let energy = 30;
    let maxEnergy = 75;
    let cafeLevel = 1;
    let famePoints = 0;
    let fameRank = 0;
    let totalServed = 0;
    let customerSlots = 3;

    let unlockedMachines = { drink: true, dessert: true, bakery: false, tea: false, juice: false, ice: false };
    let machineLevels = { drink: 1, dessert: 1, bakery: 1, tea: 1, juice: 1, ice: 1 };
    let discoveredLevel = { drink: 2, dessert: 2, bakery: 1, tea: 1, juice: 1, ice: 1 };
    let researchCost = { drink: 120, dessert: 120, bakery: 150, tea: 170, juice: 180, ice: 200 };

    let selectedIndex = null;
    let newItemIndex = null;
    let mergedItemIndex = null;
    let customers = [];
    let giftProgress = 0;
    let giftReady = false;
    let ordersSinceLastPart = 0;
    let adCooldown = false;
    let adCooldownSeconds = 0;
    let adTimer = null;

    let daily = {
      merge: { title: "Merge 5 items", value: 0, target: 5, reward: "🪙 35", claimed: false },
      serve: { title: "Serve 3 customers", value: 0, target: 3, reward: "💎 3", claimed: false },
      discover: { title: "Discover 1 recipe", value: 0, target: 1, reward: "🔧 1", claimed: false },
      mini: { title: "Play 1 mini game", value: 0, target: 1, reward: "⭐ 15", claimed: false }
    };

    let achievements = {
      serve20: { title: "Serve 20 customers", value: 0, target: 20, reward: "💎 10", claimed: false },
      rank3: { title: "Reach Trendy Spot", value: 0, target: 1, reward: "🔧 3", claimed: false },
      unlock3: { title: "Unlock 3 machines", value: 2, target: 3, reward: "💎 15", claimed: false },
      recipes6: { title: "Discover 6 recipes", value: 4, target: 6, reward: "🪙 150", claimed: false }
    };

    const pointerDrag = {
      pointerId: null,
      from: null,
      startX: 0,
      startY: 0,
      active: false,
      moved: false,
      target: null,
      ghost: null
    };

    let cleanGame = { active: false, remaining: 0, reward: 0 };
    let rushGame = { active: false, sequence: [], index: 0, reward: 0 };

    const boardEl = document.getElementById("board");
    const customersEl = document.getElementById("customers");
    const messageEl = document.getElementById("message");

    function makeItem(item, opts = {}) {
      return { item, lucky: opts.lucky || false, chainBadge: opts.chainBadge || false };
    }

    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = type === "error" ? 180 : type === "order" ? 760 : type === "merge" ? 520 : 900;
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start();
        osc.stop(ctx.currentTime + 0.12);
      } catch(e) {}
    }

    function setMsg(text) {
      messageEl.textContent = text;
    }

    function createBoard() {
      boardEl.innerHTML = "";

      for (let i = 0; i < boardSize; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;

        if (i === selectedIndex) cell.classList.add("selected");
        if (i === newItemIndex || i === mergedItemIndex) cell.classList.add("pop");

        const data = board[i];
        cell.addEventListener("pointerdown", pointerDown);

        if (data && data.machine) {
          const type = data.machine;
          const def = machineDefs[type];
          cell.classList.add("machine", def.cls);
          cell.innerHTML = `<div>${getMachineEmoji(type)}</div><div class="machine-label">${def.short} Lv.${machineLevels[type]}</div>`;
        } else if (data && data.item !== undefined) {
          if (data.lucky) cell.classList.add("lucky-cell");
          const item = items[data.item];
          cell.innerHTML = `<div class="item">${item.emoji}</div><div class="item-name">${item.name}</div>`;
          if (data.lucky) addBadge(cell, "✨", "badge-lucky");
          if (data.chainBadge) addBadge(cell, "⭐", "badge-star");
          if (isOrderReady(data.item)) addBadge(cell, "✓", "badge-ready");
        }

        boardEl.appendChild(cell);
      }

      setTimeout(() => {
        newItemIndex = null;
        mergedItemIndex = null;
      }, 400);
    }

    function addBadge(cell, text, cls) {
      const b = document.createElement("div");
      b.className = "mini-badge " + cls;
      b.textContent = text;
      cell.appendChild(b);
    }

    function getMachineEmoji(type) {
      const lvl = machineLevels[type];
      const s = chainStart[machineDefs[type].chain];
      if (lvl <= 1) return items[s].emoji;
      if (lvl === 2) return items[s + 1].emoji;
      if (lvl === 3) return items[s + 2].emoji;
      return items[s + 3].emoji;
    }

    function pointerDown(e) {
      const index = Number(e.currentTarget.dataset.index);
      const data = board[index];

      if (!data && selectedIndex === null) return;

      e.preventDefault();

      pointerDrag.pointerId = e.pointerId;
      pointerDrag.from = index;
      pointerDrag.startX = e.clientX;
      pointerDrag.startY = e.clientY;
      pointerDrag.active = false;
      pointerDrag.moved = false;
      pointerDrag.target = null;

      try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}

      window.addEventListener("pointermove", pointerMove, { passive: false });
      window.addEventListener("pointerup", pointerUp, { passive: false });
      window.addEventListener("pointercancel", pointerCancel, { passive: false });
    }

    function pointerMove(e) {
      if (e.pointerId !== pointerDrag.pointerId) return;
      e.preventDefault();

      const dx = e.clientX - pointerDrag.startX;
      const dy = e.clientY - pointerDrag.startY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (!pointerDrag.active && dist > 8 && board[pointerDrag.from]) {
        startPointerDrag(e);
      }

      if (!pointerDrag.active) return;

      pointerDrag.moved = true;
      moveGhost(e.clientX, e.clientY);

      const cell = cellFromPoint(e.clientX, e.clientY);
      document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));

      if (cell) {
        const target = Number(cell.dataset.index);
        if (target !== pointerDrag.from) {
          pointerDrag.target = target;
          cell.classList.add("drag-over");
        } else {
          pointerDrag.target = null;
        }
      } else {
        pointerDrag.target = null;
      }
    }

    function pointerUp(e) {
      if (e.pointerId !== pointerDrag.pointerId) return;
      e.preventDefault();

      const wasDragging = pointerDrag.active && pointerDrag.moved;
      const from = pointerDrag.from;
      const target = pointerDrag.target;

      cleanupPointerDrag();

      if (wasDragging && target !== null && target !== undefined) {
        moveOrMerge(from, target);
        updateAll();
      } else {
        handleBoardTap(from);
      }

      resetPointerDrag();
      removePointerListeners();
    }

    function pointerCancel() {
      cleanupPointerDrag();
      resetPointerDrag();
      removePointerListeners();
    }

    function removePointerListeners() {
      window.removeEventListener("pointermove", pointerMove);
      window.removeEventListener("pointerup", pointerUp);
      window.removeEventListener("pointercancel", pointerCancel);
    }

    function startPointerDrag(e) {
      const data = board[pointerDrag.from];
      if (!data) return;

      const ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.textContent = getBoardObjectEmoji(data);
      document.body.appendChild(ghost);
      pointerDrag.ghost = ghost;
      pointerDrag.active = true;
      moveGhost(e.clientX, e.clientY);
    }

    function moveGhost(x, y) {
      if (!pointerDrag.ghost) return;
      pointerDrag.ghost.style.left = x + "px";
      pointerDrag.ghost.style.top = y + "px";
    }

    function cellFromPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      return el ? el.closest(".cell") : null;
    }

    function cleanupPointerDrag() {
      if (pointerDrag.ghost && pointerDrag.ghost.parentNode) pointerDrag.ghost.parentNode.removeChild(pointerDrag.ghost);
      document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));
    }

    function resetPointerDrag() {
      pointerDrag.pointerId = null;
      pointerDrag.from = null;
      pointerDrag.startX = 0;
      pointerDrag.startY = 0;
      pointerDrag.active = false;
      pointerDrag.moved = false;
      pointerDrag.target = null;
      pointerDrag.ghost = null;
    }

    function getBoardObjectEmoji(data) {
      if (!data) return "";
      if (data.machine) return getMachineEmoji(data.machine);
      return items[data.item].emoji;
    }

    function handleBoardTap(index) {
      const data = board[index];

      if (data && data.machine && selectedIndex === null) {
        selectedIndex = index;
        generateItem(data.machine);
        return;
      }

      tapCell(index);
    }

    function tapCell(index) {
      if (selectedIndex === null) {
        if (board[index]) {
          selectedIndex = index;
          setMsg("Selected! Tap target or press Info.");
          createBoard();
        }
        return;
      }

      if (selectedIndex === index) {
        selectedIndex = null;
        setMsg("Selection cancelled.");
        createBoard();
        return;
      }

      moveOrMerge(selectedIndex, index);
      selectedIndex = null;
      updateAll();
    }

    function moveOrMerge(from, to) {
      const a = board[from];
      const b = board[to];

      if (!a) return;

      if (!b) {
        board[to] = a;
        board[from] = null;
        selectedIndex = to;
        setMsg(a.machine ? "Machine moved." : "Item moved.");
        return;
      }

      if (a.machine || b.machine) {
        setMsg("Machines can move, but they do not merge.");
        playSound("error");
        return;
      }

      if (a.item === b.item && mergeMap[a.item] !== undefined) {
        const newItem = mergeMap[a.item];
        const newLevel = items[newItem].level;
        const chain = items[newItem].chain;

        if (newLevel > discoveredLevel[chain]) {
          setMsg("This recipe is not discovered yet. Use Research first.");
          playSound("error");
          return;
        }

        board[to] = makeItem(newItem, {
          lucky: a.lucky || b.lucky,
          chainBadge: newLevel === 4 || a.chainBadge || b.chainBadge
        });

        board[from] = null;
        selectedIndex = to;
        mergedItemIndex = to;
        daily.merge.value++;
        updateAchievements();

        setMsg(newLevel === 4 ? items[newItem].name + " completed! ⭐" : ((a.lucky || b.lucky) ? "Lucky merge! ✨" : "Nice merge!"));
        playSound("merge");
        return;
      }

      setMsg("Only same items merge.");
      playSound("error");
    }

    function generateItem(type) {
      if (energy <= 0) {
        setMsg("No energy. Use Gift, Recycle, Boost or Shop.");
        playSound("error");
        return;
      }

      const empty = [];
      for (let i = 0; i < boardSize; i++) if (board[i] === null) empty.push(i);

      if (empty.length === 0) {
        setMsg("Board full. Merge or recycle.");
        playSound("error");
        return;
      }

      energy--;
      const slot = empty[Math.floor(Math.random() * empty.length)];
      const item = getMachineItem(type);
      let luckyChance = 0.08;

      const leyla = storyProfiles.find(p => p.id === "leyla");
      if (leyla.unlocked >= 3 && machineDefs[type].chain === "drink") luckyChance += 0.02;

      const lucky = Math.random() < luckyChance;
      board[slot] = makeItem(item, { lucky });
      newItemIndex = slot;
      setMsg(lucky ? "Lucky item! ✨" : "New item!");
      playSound("upgrade");
      updateAll();
    }

    function getMachineItem(type) {
      const chain = machineDefs[type].chain;
      const start = chainStart[chain];
      const level = machineLevels[type];
      const discovered = discoveredLevel[chain];
      const maxLevel = Math.min(level, discovered);
      const r = Math.random();

      if (maxLevel <= 1) return start;
      if (maxLevel === 2) return r < 0.82 ? start : start + 1;
      if (maxLevel === 3) return r < 0.65 ? start : r < 0.92 ? start + 1 : start + 2;
      return r < 0.5 ? start : r < 0.8 ? start + 1 : r < 0.96 ? start + 2 : start + 3;
    }

    function createCustomers() {
      customersEl.innerHTML = "";

      customers.forEach((c, index) => {
        const ready = isCustomerReady(c);
        const card = document.createElement("div");
        card.className = "customer-card" + (ready ? " ready" : "");

        card.innerHTML = `
          ${ready ? `<div class="ready-check">✓</div>` : ""}
          <div class="customer-top">
            <div class="portrait-ring">
              <img src="${c.profile.portrait}" alt="${c.profile.name}">
            </div>
            <div class="customer-meta">
              <div class="customer-name">${c.profile.name}</div>
              <div class="customer-trait">${c.profile.trait}</div>
              <div class="customer-mood">${c.profile.mood}</div>
            </div>
          </div>

          <div class="order-block">
            <div class="order-label">Order</div>
            <div class="order-emoji">${orderEmojiText(c.orders)}</div>
            <div class="order-name">${orderNameText(c.orders)}</div>
          </div>

          <div class="reward">
            <span>🪙 ${getCustomerReward(c)}</span>
            ${c.givesPart ? `<span>🔧 +1</span>` : ""}
            <span>⭐ +${getCustomerFameReward(c)}</span>
          </div>

          ${ready ? `<button class="serve-btn" onclick="serveCustomer(${index})">Serve</button>` : ``}
        `;
        customersEl.appendChild(card);
      });
    }

    function orderEmojiText(orderArr) {
      return orderArr.map(i => items[i].emoji).join(" + ");
    }

    function orderNameText(orderArr) {
      return orderArr.map(i => items[i].name).join(" + ");
    }

    function setupCustomers() {
      customers = [];
      for (let i = 0; i < customerSlots; i++) customers.push(newCustomer());
    }

    function newCustomer() {
      const profile = storyProfiles[Math.floor(Math.random() * storyProfiles.length)];
      const orderCount = shouldMakeMultiOrder() ? 2 : 1;
      const pool = availableOrders();
      const orders = [];

      for (let i = 0; i < orderCount; i++) {
        let pick = pool[Math.floor(Math.random() * pool.length)];
        let safety = 0;
        while (orders.includes(pick) && safety < 10) {
          pick = pool[Math.floor(Math.random() * pool.length)];
          safety++;
        }
        orders.push(pick);
      }

      return { profile, orders, givesPart: orderGivesPart() };
    }

    function shouldMakeMultiOrder() {
      if (fameRank < 3) return false;
      const ada = storyProfiles.find(p => p.id === "ada");
      let chance = fameRank >= 4 ? 0.45 : 0.25;
      if (ada.unlocked >= 2) chance += 0.10;
      return Math.random() < chance;
    }

    function availableOrders() {
      const result = [];

      Object.keys(chainStart).forEach(chain => {
        if (!isChainAvailable(chain)) return;
        const start = chainStart[chain];
        const max = discoveredLevel[chain];
        for (let lvl = 2; lvl <= max; lvl++) {
          result.push(start + lvl - 1);
        }
      });

      if (result.length === 0) return [1, 5];
      return result;
    }

    function isChainAvailable(chain) {
      const machineType = Object.keys(machineDefs).find(k => machineDefs[k].chain === chain);
      return machineType && unlockedMachines[machineType];
    }

    function orderGivesPart() {
      if (ordersSinceLastPart >= 4) return true;
      return Math.random() < 0.25;
    }

    function isCustomerReady(c) {
      const used = {};
      for (const itemIndex of c.orders) {
        const boardIndex = board.findIndex((x, idx) => x && x.item === itemIndex && !used[idx]);
        if (boardIndex === -1) return false;
        used[boardIndex] = true;
      }
      return true;
    }

    function hasOrderItem(itemIndex) {
      return customers.some(c => c.orders.includes(itemIndex));
    }

    function isOrderReady(itemIndex) {
      return hasOrderItem(itemIndex);
    }

    function getBaseReward(itemIndex) {
      const level = items[itemIndex].level;
      const base = { 1: 8, 2: 20, 3: 45, 4: 85 };
      return base[level] || 15;
    }

    function getCustomerReward(c) {
      let reward = c.orders.reduce((sum, itemIndex) => sum + getBaseReward(itemIndex), 0);
      reward += fameRank * 5;

      const ada = storyProfiles.find(p => p.id === "ada");
      const bora = storyProfiles.find(p => p.id === "bora");
      const kerem = storyProfiles.find(p => p.id === "kerem");
      const luna = storyProfiles.find(p => p.id === "luna");
      const emre = storyProfiles.find(p => p.id === "emre");

      c.orders.forEach(itemIndex => {
        const item = items[itemIndex];
        if (kerem.unlocked >= 1 && item.name === "Coffee") reward += 5;
        if (luna.unlocked >= 1 && item.name === "Latte") reward += 5;
        if (emre.unlocked >= 1 && item.name === "Cupcake") reward += 5;
        if (bora.unlocked >= 1 && item.chain === "dessert") reward += 10;
      });

      if (c.orders.length > 1) reward += 35;
      if (ada.unlocked >= 3) reward += 5;
      return reward;
    }

    function getCustomerFameReward(c) {
      let fame = c.orders.reduce((sum, itemIndex) => sum + items[itemIndex].level * 4 + 4, 0);
      if (c.orders.length > 1) fame += 10;
      const ada = storyProfiles.find(p => p.id === "ada");
      if (ada.unlocked >= 1) fame = Math.ceil(fame * 1.1);
      return fame;
    }

    function serveCustomer(index) {
      const c = customers[index];
      if (!isCustomerReady(c)) {
        setMsg("Order items are not ready.");
        playSound("error");
        return;
      }

      let luckyBonus = 0;
      const used = {};

      c.orders.forEach(itemIndex => {
        const boardIndex = board.findIndex((x, idx) => x && x.item === itemIndex && !used[idx]);
        if (boardIndex !== -1) {
          const served = board[boardIndex];
          if (served.lucky) luckyBonus += 25;
          board[boardIndex] = null;
          used[boardIndex] = true;
        }
      });

      let reward = getCustomerReward(c) + luckyBonus;
      const fameGain = getCustomerFameReward(c) + (luckyBonus ? 6 : 0);

      coins += reward;
      famePoints += fameGain;
      c.profile.visits++;
      totalServed++;
      daily.serve.value++;
      achievements.serve20.value = totalServed;

      let partMsg = "";
      if (c.givesPart) {
        parts++;
        ordersSinceLastPart = 0;
        partMsg = " +1 🔧";
      } else {
        ordersSinceLastPart++;
      }

      const emre = storyProfiles.find(p => p.id === "emre");
      giftProgress++;
      if (emre.unlocked >= 3 && Math.random() < 0.3) giftProgress++;

      customers[index] = newCustomer();

      setMsg((luckyBonus ? "Lucky order! " : "Served! ") + "+" + reward + " 🪙 +" + fameGain + " ⭐" + partMsg);
      playSound("order");

      updateAll();
      checkFameRankUp();
      updateAchievements();

      if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
    }

    function openSheet(type, btn) {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
      const sheet = document.getElementById("sheet");
      sheet.dataset.type = type;
      refreshOpenSheet();
      sheet.classList.add("show");
    }

    function refreshOpenSheet() {
      const sheet = document.getElementById("sheet");
      const type = sheet.dataset.type || "goals";
      const title = document.getElementById("sheetTitle");
      const content = document.getElementById("sheetContent");

      if (type === "goals") { title.textContent = "🎯 Goals"; content.innerHTML = renderGoalsPanel(); }
      if (type === "fame") { title.textContent = "⭐ Cafe Fame"; content.innerHTML = renderFamePanel(); }
      if (type === "gift") { title.textContent = "🎁 Gift"; content.innerHTML = renderGiftPanel(); }
      if (type === "shop") { title.textContent = "🛒 Shop"; content.innerHTML = renderShopPanel(); }
      if (type === "info") { title.textContent = "ℹ️ Info"; content.innerHTML = renderInfoPanel(); }
      if (type === "minigame") { title.textContent = "🎮 Mini Games"; content.innerHTML = renderMiniGamePanel(); }
    }

    function closeSheet() {
      document.getElementById("sheet").classList.remove("show");
    }

    function renderGoalsPanel() {
      return `
        <div class="panel-card">
          <h3>Daily Tasks</h3>
          <p>These give you a reason to keep playing beyond the merge board.</p>
        </div>
        ${renderTask("merge", daily.merge)}
        ${renderTask("serve", daily.serve)}
        ${renderTask("discover", daily.discover)}
        ${renderTask("mini", daily.mini)}

        <div class="panel-card">
          <h3>Mini Games</h3>
          <p>Take a short break from merging and earn rewards.</p>
          <button class="blue-btn" onclick="openSheet('minigame')">Open Mini Games</button>
        </div>

        <div class="panel-card">
          <h3>Achievements</h3>
          <p>Long-term goals for progression.</p>
        </div>
        ${renderAchievement("serve20", achievements.serve20)}
        ${renderAchievement("rank3", achievements.rank3)}
        ${renderAchievement("unlock3", achievements.unlock3)}
        ${renderAchievement("recipes6", achievements.recipes6)}
      `;
    }

    function renderTask(key, task) {
      const pct = Math.min(100, Math.round((task.value / task.target) * 100));
      const done = task.value >= task.target;
      return `
        <div class="task-card">
          <h3>${done ? "✅" : "▫️"} ${task.title}</h3>
          <p>${Math.min(task.value, task.target)} / ${task.target} · Reward: ${task.reward}</p>
          <div class="task-progress"><div class="task-fill" style="width:${pct}%"></div></div>
          <button class="green-btn" onclick="claimDaily('${key}')" ${done && !task.claimed ? "" : "disabled"}>${task.claimed ? "Claimed" : "Claim Reward"}</button>
        </div>`;
    }

    function renderAchievement(key, ach) {
      const pct = Math.min(100, Math.round((ach.value / ach.target) * 100));
      const done = ach.value >= ach.target;
      return `
        <div class="task-card">
          <h3>${done ? "🏆" : "🔒"} ${ach.title}</h3>
          <p>${Math.min(ach.value, ach.target)} / ${ach.target} · Reward: ${ach.reward}</p>
          <div class="task-progress"><div class="task-fill" style="width:${pct}%"></div></div>
          <button class="orange-btn" onclick="claimAchievement('${key}')" ${done && !ach.claimed ? "" : "disabled"}>${ach.claimed ? "Claimed" : "Claim Reward"}</button>
        </div>`;
    }

    function claimDaily(key) {
      const task = daily[key];
      if (!task || task.claimed || task.value < task.target) return;
      task.claimed = true;

      const emre = storyProfiles.find(p => p.id === "emre");

      if (key === "merge") coins += 35;
      if (key === "serve") gems += emre.unlocked >= 2 ? 4 : 3;
      if (key === "discover") parts += 1;
      if (key === "mini") famePoints += 15;

      setMsg("Daily reward claimed!");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function claimAchievement(key) {
      const ach = achievements[key];
      if (!ach || ach.claimed || ach.value < ach.target) return;
      ach.claimed = true;

      if (key === "serve20") gems += 10;
      if (key === "rank3") parts += 3;
      if (key === "unlock3") gems += 15;
      if (key === "recipes6") coins += 150;

      setMsg("Achievement reward claimed!");
      playSound("upgrade");
      updateAll();
      refreshOpenSheet();
    }

    function updateAchievements() {
      achievements.rank3.value = fameRank >= 2 ? 1 : 0;
      achievements.unlock3.value = Object.values(unlockedMachines).filter(Boolean).length;
      achievements.recipes6.value = Object.values(discoveredLevel).reduce((a, b) => a + b, 0);
    }

    function renderFamePanel() {
      const next = fameRanks[fameRank + 1];
      const currentNeed = fameRanks[fameRank].need;
      const nextNeed = next ? next.need : fameRanks[fameRank].need;
      const pct = next ? Math.min(100, Math.round((famePoints - currentNeed) / (nextNeed - currentNeed) * 100)) : 100;

      let html = `
        <div class="fame-hero">
          <div class="fame-rank-title">⭐ ${fameRanks[fameRank].name}</div>
          <div class="fame-rank-sub">Fame: ${famePoints}${next ? " / " + next.need : " MAX"}</div>
          <div class="fame-bar"><div class="fame-fill" style="width:${pct}%"></div></div>
        </div>

        <div class="unlock-card">
          <h3>Research Lab</h3>
          <p>Research now discovers real recipes. New recipes can appear in orders and be merged on the board.</p>
          ${renderResearchButton("drink")}
          ${renderResearchButton("dessert")}
          ${unlockedMachines.bakery ? renderResearchButton("bakery") : ""}
          ${unlockedMachines.tea ? renderResearchButton("tea") : ""}
          ${unlockedMachines.juice ? renderResearchButton("juice") : ""}
          ${unlockedMachines.ice ? renderResearchButton("ice") : ""}
        </div>

        <div class="unlock-card">
          <h3>Spend Coins</h3>
          <p>Coins unlock useful progress, not just numbers.</p>
          <button class="orange-btn" onclick="unlockExtraCustomerSlot()" ${customerSlots >= 4 || fameRank < 1 ? "disabled" : ""}>Unlock 4th Customer Slot - 300 🪙</button>
        </div>

        <div class="panel-card">
          <h3>Customer Stories</h3>
          <p>Stories now give permanent bonuses. Unlocking them improves rewards, fame, gift progress or production chances.</p>
        </div>
      `;

      storyProfiles.forEach(p => {
        const nextStory = p.unlocked < p.stories.length ? p.stories[p.unlocked] : null;
        const canUnlock = nextStory && p.visits >= p.unlocked + 1;
        const cost = p.costs[p.unlocked] || 0;

        html += `
          <div class="story-card">
            <div class="story-top">
              <div class="story-avatar">
                <img src="${p.portrait}" alt="${p.name}">
              </div>
              <div class="story-body">
                <div class="story-title">${p.name}</div>
                <div class="story-meta">${p.trait} · Favorite: ${p.favorite} · Visits: ${p.visits} · Story: ${p.unlocked}/3</div>
              </div>
              ${nextStory ? `<button class="small-action-btn" onclick="unlockStory('${p.id}')" ${canUnlock ? "" : "disabled"}>${cost} 🪙</button>` : `<span class="done-badge2">Done ✓</span>`}
            </div>
            ${p.unlocked > 0 ? `<div class="story-text">${p.stories[p.unlocked - 1]}</div>` : `<div class="story-text">Serve this customer to reveal their story.</div>`}
            <div class="info-note"><b>Next Bonus:</b> ${p.unlocked < p.bonusNames.length ? p.bonusNames[p.unlocked] : "All bonuses unlocked."}</div>
            ${nextStory && !canUnlock ? `<p style="font-size:12px;font-weight:900;color:#8b5e34;margin-top:7px;">Need ${p.unlocked + 1} visit(s) to unlock next story.</p>` : ""}
          </div>`;
      });

      return html;
    }

    function renderResearchButton(chain) {
      const label = chainLabel(chain);
      const level = discoveredLevel[chain];

      if (level >= 4) {
        return `<button class="green-btn" disabled>${label} Research Complete ✓</button>`;
      }

      const nextItem = items[chainStart[chain] + level];
      return `<button class="blue-btn" onclick="doResearch('${chain}'); refreshOpenSheet();">${label} Research - ${researchCost[chain]} 🪙<br>Discover: ${nextItem.emoji} ${nextItem.name}</button>`;
    }

    function chainLabel(chain) {
      if (chain === "drink") return "Drink";
      if (chain === "dessert") return "Dessert";
      if (chain === "bakery") return "Bakery";
      if (chain === "tea") return "Tea";
      if (chain === "juice") return "Juice";
      if (chain === "ice") return "Ice Cream";
      return chain;
    }

    function doResearch(chain) {
      if (discoveredLevel[chain] >= 4) {
        setMsg("All recipes already discovered.");
        return;
      }

      const cost = researchCost[chain];
      if (coins < cost) {
        setMsg("Need " + cost + " coins for research.");
        playSound("error");
        return;
      }

      coins -= cost;
      const oldLevel = discoveredLevel[chain];
      discoveredLevel[chain]++;
      researchCost[chain] += 80;

      const itemIndex = chainStart[chain] + oldLevel;
      const item = items[itemIndex];

      daily.discover.value++;
      updateAchievements();
      famePoints += 8;

      showGameModal("🔬", "New Recipe Discovered!", item.emoji + " " + item.name, "Unlocked for merge, machine production and customer orders. Reward: +8 ⭐");
      setMsg(item.name + " discovered!");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
    }

    function unlockExtraCustomerSlot() {
      if (customerSlots >= 4) return;
      if (fameRank < 1) { setMsg("Reach Local Favorite first."); return; }
      if (coins < 300) { setMsg("Need 300 coins."); playSound("error"); return; }

      coins -= 300;
      customerSlots = 4;
      customers.push(newCustomer());
      famePoints += 25;
      setMsg("4th customer slot unlocked! +25 ⭐");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function unlockStory(id) {
      const p = storyProfiles.find(x => x.id === id);
      if (!p || p.unlocked >= p.stories.length) return;

      if (p.visits < p.unlocked + 1) {
        setMsg("Serve this customer more to unlock the story.");
        return;
      }

      const cost = p.costs[p.unlocked];
      if (coins < cost) {
        setMsg("Need " + cost + " coins.");
        playSound("error");
        return;
      }

      coins -= cost;
      p.unlocked++;

      const fameGain = 20 + p.unlocked * 10;
      famePoints += fameGain;

      if (p.unlocked === 3) parts += 1;

      showGameModal("📖", "Story Bonus Unlocked!", p.name, p.bonusNames[p.unlocked - 1] + "<br>Reward: +" + fameGain + " ⭐" + (p.unlocked === 3 ? " +1 🔧" : ""));
      setMsg("Story unlocked: " + p.name + "! +" + fameGain + " ⭐");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function renderGiftPanel() {
      return `
        <div class="panel-card">
          <h3>Gift Box</h3>
          <p>${giftReady ? "Gift ready! Claim +8 energy." : "Serve " + giftProgress + "/3 customers to unlock."}</p>
          <button class="green-btn" onclick="claimGift(); refreshOpenSheet();" ${giftReady ? "" : "disabled"}>${giftReady ? "Claim +8 ⚡" : "Locked"}</button>
        </div>

        <div class="panel-card">
          <h3>Recycle</h3>
          <p>Select an item on the board. Recycle it for energy.</p>
          <button class="green-btn" onclick="recycleSelected(); refreshOpenSheet();">Recycle Selected Item</button>
        </div>

        <div class="panel-card">
          <h3>Energy Boost</h3>
          <p>Watch a short ad break to get +15 energy.</p>
          <button class="blue-btn" onclick="watchAd(); refreshOpenSheet();" ${adCooldown ? "disabled" : ""}>${adCooldown ? "Available in " + adCooldownSeconds + "s" : "Watch Ad +15 ⚡"}</button>
        </div>

        <div class="panel-card">
          <h3>Mini Games</h3>
          <p>Play short mini games for bonus coins, fame and energy.</p>
          <button class="purple-btn" onclick="openSheet('minigame')">Open Mini Games</button>
        </div>`;
    }

    function renderShopPanel() {
      return `
        <div class="panel-card">
          <h3>💎 Gem Shop</h3>
          <p>Gems are a future premium currency. Later these can connect to App Store / Google Play purchases.</p>
          <p><b>Your gems:</b> 💎 ${gems}</p>
          <button class="green-btn" onclick="buyEnergyWithGems(10, 6); refreshOpenSheet();">Buy +10 Energy - 6 💎</button>
          <button class="blue-btn" onclick="buyEnergyWithGems(25, 14); refreshOpenSheet();">Buy +25 Energy - 14 💎</button>
          <button class="orange-btn" onclick="prototypeBuyGems(); refreshOpenSheet();">Prototype Gem Pack +25 💎</button>
          <div class="info-note">Prototype Gem Pack is free for testing now. Later it can become a real payment product.</div>
        </div>

        <div class="panel-card">
          <h3>New Machines</h3>
          <p>Unlock machines with gems as your cafe becomes more famous.</p>
          ${renderMachineShop("bakery")}
          ${renderMachineShop("tea")}
          ${renderMachineShop("juice")}
          ${renderMachineShop("ice")}
        </div>`;
    }

    function renderMachineShop(type) {
      const def = machineDefs[type];

      if (unlockedMachines[type]) {
        return `<button class="green-btn" disabled>${def.emoji} ${def.name} Owned ✓</button>`;
      }

      const rankOk = fameRank >= def.unlockRank;
      const gemOk = gems >= def.cost;
      return `<button class="orange-btn" onclick="unlockMachine('${type}'); refreshOpenSheet();" ${rankOk && gemOk ? "" : "disabled"}>${def.emoji} Unlock ${def.name} - ${def.cost} 💎<br>Requires: ${fameRanks[def.unlockRank].name}</button>`;
    }

    function unlockMachine(type) {
      const def = machineDefs[type];

      if (unlockedMachines[type]) return;
      if (fameRank < def.unlockRank) {
        setMsg("Reach " + fameRanks[def.unlockRank].name + " first.");
        playSound("error");
        return;
      }

      if (gems < def.cost) {
        setMsg("Need " + def.cost + " gems.");
        playSound("error");
        return;
      }

      const empty = firstEmptyCell();
      if (empty === -1) {
        setMsg("Need an empty board cell for new machine.");
        playSound("error");
        return;
      }

      gems -= def.cost;
      unlockedMachines[type] = true;
      board[empty] = { machine: type };

      famePoints += 20;
      updateAchievements();

      showGameModal("🛒", "New Machine Unlocked!", def.emoji + " " + def.name, "A new item chain is now available. Reward: +20 ⭐");
      setMsg(def.name + " unlocked!");
      playSound("upgrade");

      updateAll();
      checkFameRankUp();
    }

    function buyEnergyWithGems(amount, cost) {
      if (gems < cost) {
        setMsg("Need " + cost + " 💎.");
        playSound("error");
        return;
      }

      if (energy >= maxEnergy) {
        setMsg("Energy is already full.");
        return;
      }

      gems -= cost;
      energy = Math.min(maxEnergy, energy + amount);
      setMsg("Energy purchased! +" + amount + " ⚡");
      playSound("upgrade");
      updateAll();
    }

    function prototypeBuyGems() {
      gems += 25;
      setMsg("Prototype gem pack added! +25 💎");
      playSound("upgrade");
      updateAll();
    }

    function renderMiniGamePanel() {
      return `
        <div class="panel-card">
          <h3>🧽 Clean the Table</h3>
          <p>Tap all stains before they disappear. Reward: coins + fame.</p>
          <button class="green-btn" onclick="startCleanGame(); refreshOpenSheet();">Start Clean Game</button>
        </div>

        <div class="panel-card">
          <h3>☕ Coffee Rush</h3>
          <p>Tap the correct sequence to make a quick drink. Reward: energy + coins.</p>
          <button class="blue-btn" onclick="startRushGame(); refreshOpenSheet();">Start Coffee Rush</button>
        </div>

        <div id="miniGameMount">${renderActiveMiniGame()}</div>`;
    }

    function renderActiveMiniGame() {
      if (cleanGame.active) {
        return `
          <div class="panel-card">
            <h3>Clean the Table</h3>
            <p>Remaining stains: ${cleanGame.remaining}</p>
            <div class="mini-game-area" id="cleanArea"></div>
          </div>`;
      }

      if (rushGame.active) {
        return `
          <div class="panel-card">
            <h3>Coffee Rush</h3>
            <p>Tap the sequence in order.</p>
            <div class="rush-sequence">${rushGame.sequence.map((s, idx) => `<span style="${idx < rushGame.index ? "opacity:.35" : ""}">${s}</span>`).join("")}</div>
            <div class="rush-btn-row">
              <button class="rush-btn" onclick="tapRush('🫘')">🫘</button>
              <button class="rush-btn" onclick="tapRush('☕')">☕</button>
              <button class="rush-btn" onclick="tapRush('🥤')">🥤</button>
            </div>
          </div>`;
      }

      return ``;
    }

    function startCleanGame() {
      cleanGame.active = true;
      cleanGame.remaining = 5;
      cleanGame.reward = 0;
      daily.mini.value++;
      setTimeout(spawnCleanStains, 80);
    }

    function spawnCleanStains() {
      const area = document.getElementById("cleanArea");
      if (!area) return;
      area.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        const dot = document.createElement("button");
        dot.className = "stain-dot";
        dot.textContent = "🧽";
        dot.style.left = Math.floor(Math.random() * 74 + 3) + "%";
        dot.style.top = Math.floor(Math.random() * 68 + 8) + "%";
        dot.onclick = () => cleanDot(dot);
        area.appendChild(dot);
      }
    }

    function cleanDot(dot) {
      if (!cleanGame.active) return;
      dot.remove();
      cleanGame.remaining--;
      cleanGame.reward += 1;

      if (cleanGame.remaining <= 0) finishCleanGame();
      else {
        refreshOpenSheet();
        setTimeout(spawnCleanStains, 30);
      }
    }

    function finishCleanGame() {
      cleanGame.active = false;
      coins += 25;
      famePoints += 12;
      giftProgress++;
      setMsg("Clean game completed! +25 🪙 +12 ⭐");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function startRushGame() {
      rushGame.active = true;
      rushGame.sequence = ["🫘", "☕", "🥤", "☕", "🫘"];
      rushGame.index = 0;
      rushGame.reward = 0;
      daily.mini.value++;
    }

    function tapRush(symbol) {
      if (!rushGame.active) return;

      if (rushGame.sequence[rushGame.index] === symbol) {
        rushGame.index++;
        if (rushGame.index >= rushGame.sequence.length) finishRushGame();
        else refreshOpenSheet();
      } else {
        rushGame.active = false;
        setMsg("Coffee Rush failed. Try again!");
        playSound("error");
        refreshOpenSheet();
      }
    }

    function finishRushGame() {
      rushGame.active = false;
      coins += 20;
      energy = Math.min(maxEnergy, energy + 6);
      famePoints += 8;
      setMsg("Coffee Rush completed! +20 🪙 +6 ⚡ +8 ⭐");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function openInfoPanel() {
      if (selectedIndex === null || !board[selectedIndex]) {
        setMsg("Select an item or machine first, then tap Info.");
      }
      openSheet("info", null);
    }

    function renderInfoPanel() {
      if (selectedIndex === null || !board[selectedIndex]) {
        return `
          <div class="panel-card">
            <h3>ℹ️ Item Info</h3>
            <p>Select any item or machine on the board first. Then tap the Info button again.</p>
          </div>`;
      }

      const data = board[selectedIndex];

      if (data.machine) {
        const type = data.machine;
        const def = machineDefs[type];
        const lvl = machineLevels[type];
        const cost = upgradeCost(type);
        const produces = getMachineProductionText(type);
        return `
          <div class="panel-card">
            <h3>${getMachineEmoji(type)} ${def.name}</h3>
            <p><b>Level:</b> ${lvl}</p>
            <p><b>Produces:</b> ${produces}</p>
            <p><b>How it works:</b> Tap the machine to produce items. Drag it to move it on the board.</p>
            <p><b>Upgrade:</b> ${lvl >= 4 ? "Max level reached." : "Cost: " + cost + " 🔧"}</p>
            <button class="${type === "drink" ? "blue-btn" : "orange-btn"}" onclick="upgradeMachine('${type}'); refreshOpenSheet();" ${lvl >= 4 ? "disabled" : ""}>${lvl >= 4 ? "Max Level" : "Upgrade Machine"}</button>
          </div>`;
      }

      const item = items[data.item];
      const chain = getChainItems(item.chain);
      const nextIndex = mergeMap[data.item];
      const nextText = nextIndex !== undefined ? items[nextIndex].emoji + " " + items[nextIndex].name : "Max level";
      const how = item.level === 1 ? "Produced by " + chainLabel(item.chain) + " machine." : "Merge two previous items from the same chain.";

      return `
        <div class="panel-card">
          <h3>${item.emoji} ${item.name}</h3>
          <p><b>Product name:</b> ${item.name}</p>
          <p><b>How to make:</b> ${how}</p>
          <p><b>Merge chain:</b> ${chain.map(i => items[i].name).join(" → ")}</p>
          <p><b>Next merge:</b> ${nextText}</p>
          <p><b>Discovered:</b> ${item.level <= discoveredLevel[item.chain] ? "Yes" : "No"}</p>
          ${data.lucky ? `<p><b>Lucky:</b> This item gives extra reward when served.</p>` : ""}
          ${data.chainBadge ? `<p><b>Badge:</b> ⭐ Special completed item.</p>` : ""}
        </div>`;
    }

    function getChainItems(chain) {
      const s = chainStart[chain];
      return [s, s + 1, s + 2, s + 3];
    }

    function getMachineProductionText(type) {
      const chain = machineDefs[type].chain;
      const start = chainStart[chain];
      const max = Math.min(machineLevels[type], discoveredLevel[chain]);
      const names = [];
      for (let i = 0; i < max; i++) names.push(items[start + i].emoji + " " + items[start + i].name);
      return names.join(", ");
    }

    function upgradeMachine(type) {
      const lvl = machineLevels[type];

      if (lvl >= 4) {
        setMsg("Machine already max.");
        return;
      }

      const cost = upgradeCost(type);
      if (parts < cost) {
        setMsg("Need " + cost + " 🔧.");
        playSound("error");
        return;
      }

      parts -= cost;
      machineLevels[type]++;
      energy = Math.min(maxEnergy, energy + 10);
      famePoints += 10;

      setMsg(machineDefs[type].name + " upgraded! +10 ⚡ +10 ⭐");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
    }

    function upgradeCost(type) {
      const lvl = machineLevels[type];
      return lvl === 1 ? 3 : lvl === 2 ? 6 : lvl === 3 ? 10 : 999;
    }

    function checkFameRankUp() {
      const next = fameRanks[fameRank + 1];
      if (!next) return;

      if (famePoints >= next.need) {
        fameRank++;
        cafeLevel = fameRank + 1;

        let rewardText = fameRanks[fameRank].reward;

        if (fameRank === 1) {
          energy = Math.min(maxEnergy, energy + 10);
          parts += 1;
          gems += 5;
        }

        if (fameRank === 2) {
          energy = Math.min(maxEnergy, energy + 15);
          parts += 2;
        }

        if (fameRank === 3) {
          energy = Math.min(maxEnergy, energy + 20);
          gems += 10;
        }

        if (fameRank === 4) {
          energy = Math.min(maxEnergy, energy + 25);
          gems += 20;
        }

        updateAchievements();
        showGameModal("⭐", "Fame Rank Up!", fameRanks[fameRank].name, rewardText);
        playSound("upgrade");
        updateAll();
      }
    }

    function claimGift() {
      if (!giftReady) return;
      energy = Math.min(maxEnergy, energy + 8);
      giftProgress = 0;
      giftReady = false;
      setMsg("Gift claimed! +8 ⚡");
      playSound("upgrade");
      updateAll();
    }

    function recycleSelected() {
      if (selectedIndex === null || !board[selectedIndex]) {
        setMsg("Select an item first.");
        playSound("error");
        return;
      }

      const obj = board[selectedIndex];
      if (obj.machine) {
        setMsg("Machines cannot be recycled.");
        playSound("error");
        return;
      }

      const gain = Math.min(6, items[obj.item].level + (obj.lucky ? 1 : 0));
      board[selectedIndex] = null;
      selectedIndex = null;
      energy = Math.min(maxEnergy, energy + gain);

      setMsg("Recycled! +" + gain + " ⚡");
      playSound("upgrade");
      updateAll();
    }

    function watchAd() {
      if (adCooldown) return;

      let seconds = 5;
      setMsg("Ad break... 5s");
      adCooldown = true;

      const countdown = setInterval(() => {
        seconds--;
        setMsg("Ad break... " + seconds + "s");

        if (seconds <= 0) {
          clearInterval(countdown);
          energy = Math.min(maxEnergy, energy + 15);
          setMsg("Ad reward! +15 ⚡");
          playSound("upgrade");
          startAdCooldown();
          updateAll();
          if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
        }
      }, 1000);
    }

    function startAdCooldown() {
      adCooldownSeconds = 60;
      if (adTimer) clearInterval(adTimer);

      adTimer = setInterval(() => {
        adCooldownSeconds--;
        if (adCooldownSeconds <= 0) {
          clearInterval(adTimer);
          adCooldown = false;
        }
        if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
      }, 1000);
    }

    function firstEmptyCell() {
      return board.findIndex(x => x === null);
    }

    function showGameModal(icon, title, name, reward) {
      document.getElementById("modalIcon").textContent = icon;
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalName").textContent = name;
      document.getElementById("modalReward").innerHTML = reward;
      document.getElementById("gameModal").classList.add("show");
      spawnConfetti();
    }

    function closeGameModal() {
      document.getElementById("gameModal").classList.remove("show");
      document.querySelectorAll(".confetti").forEach(x => x.remove());
    }

    function spawnConfetti() {
      const card = document.getElementById("modalCard");
      document.querySelectorAll(".confetti").forEach(x => x.remove());
      const icons = ["⭐", "✨", "🎉", "🪙", "💎"];

      for (let i = 0; i < 22; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.textContent = icons[Math.floor(Math.random() * icons.length)];
        c.style.left = Math.floor(Math.random() * 95) + "%";
        c.style.top = "-30px";
        c.style.animationDelay = (Math.random() * 0.3) + "s";
        card.appendChild(c);
      }
    }

    function updateAll() {
      cafeLevel = fameRank + 1;
      document.getElementById("coinsText").textContent = "🪙 " + coins;
      document.getElementById("gemsText").textContent = "💎 " + gems;
      document.getElementById("partsText").textContent = "🔧 " + parts;
      document.getElementById("energyText").textContent = "⚡ " + energy + "/" + maxEnergy;
      giftReady = giftProgress >= 3;
      createBoard();
      createCustomers();
      updateAchievements();
    }

    document.addEventListener("dragstart", e => e.preventDefault());

    setupCustomers();
    updateAll();
    generateItem("drink");
    generateItem("dessert");
    generateItem("drink");
    setMsg("Merge, discover recipes, unlock machines and grow your cafe!");
  </script>
</body>
</html>
